<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Non-Linear Story Hub</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #4da6ff;
            --accent-hover: #80bfff;
            --danger-color: #ff5555;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            font-weight: 600;
            text-align: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
        }

        .menu-container {
            max-width: 800px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }

        @media (min-width: 600px) {
            .menu-container {
                grid-template-columns: 1fr 1fr;
            }
        }

        .story-button {
            background-color: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            padding: 20px;
            text-align: left;
            font-size: 1.1rem;
            color: var(--text-color);
            cursor: pointer;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .story-button:hover {
            transform: translateY(-2px);
            border-color: var(--accent-color);
            box-shadow: 0 6px 12px rgba(77, 166, 255, 0.2);
        }

        /* Modal Overlay Screen */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .confirmation-box {
            background-color: var(--card-bg);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .confirmation-box h2 {
            margin-top: 0;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .confirmation-box p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        @media (min-width: 400px) {
            .action-buttons {
                flex-direction: row;
                justify-content: center;
            }
        }

        .btn {
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: background-color 0.2s;
            border: none;
        }

        .btn-start {
            background-color: var(--accent-color);
            color: #121212;
        }

        .btn-start:hover {
            background-color: var(--accent-hover);
        }

        .btn-back {
            background-color: transparent;
            color: var(--text-color);
            border: 1px solid #555;
        }

        .btn-back:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: #888;
        }
    </style>
</head>
<body>

    <h1>Select a Non-Linear Story</h1>

    <div class="menu-container">
        <button class="story-button" onclick="selectStory('C.R.7', 'https://nitrogen-ai.github.io/English/C.R.7.html')">C.R.7</button>
        
        <button class="story-button" onclick="selectStory('How to take over the world', 'https://nitrogen-ai.github.io/English/How%20to%20take%20over%20the%20world.html')">How to take over the world</button>
        
        <button class="story-button" onclick="selectStory('Sport School in Berlin', 'https://nitrogen-ai.github.io/English/Sport%20School%20in%20Berlin.html')">Sport School in Berlin</button>
        
        <button class="story-button" onclick="selectStory('The Ninjas from Quaysia', 'https://nitrogen-ai.github.io/English/The%20Ninjas%20from%20Quaysia.html')">The Ninjas from Quaysia</button>
        
        <button class="story-button" onclick="selectStory('The life', 'https://nitrogen-ai.github.io/English/The%20life.html')">The life</button>
        
        <button class="story-button" onclick="selectStory('Thedeathlyjoke', 'https://nitrogen-ai.github.io/English/Thedeathlyjoke.html')">Thedeathlyjoke</button>
        
        <button class="story-button" onclick="selectStory('In the dark forest', 'https://nitrogen-ai.github.io/English/In%20the%20dark%20forest.html')">In the dark forest</button>
        
        <button class="story-button" onclick="selectStory('The French Captain and the kingdom pirate hunters', 'https://nitrogen-ai.github.io/English/The%20French%20Captain%20and%20the%20kingdom%20pirate%20hunters.html')">The French Captain and the kingdom pirate hunters</button>
        
        <button class="story-button" onclick="selectStory('The way to the magic', 'https://nitrogen-ai.github.io/English/The%20way%20to%20the%20magic.html')">The way to the magic</button>
        
        <button class="story-button" onclick="selectStory('Survival-Adventure August', 'https://nitrogen-ai.github.io/English/Survival-Adventure%20August.html')">Survival-Adventure August</button>
    </div>

    <div id="storyOverlay" class="overlay">
        <div class="confirmation-box">
            <h2 id="currentStoryTitle">Story Title</h2>
            <p>You are about to enter this non-linear adventure.</p>
            <div class="action-buttons">
                <a id="startStoryLink" href="#" class="btn btn-start">Start Reading</a>
                <button onclick="closeMenu()" class="btn btn-back">Go Back to Menu</button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('storyOverlay');
        const storyTitleText = document.getElementById('currentStoryTitle');
        const startStoryLink = document.getElementById('startStoryLink');

        function selectStory(title, url) {
            storyTitleText.textContent = title;
            startStoryLink.href = url;
            overlay.classList.add('active');
        }

        function closeMenu() {
            overlay.classList.remove('active');
        }

        // Close overlay if reader clicks outside the box
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                closeMenu();
            }
        });
    </script>

</body>
</html>

    <strong>Did you know?</strong> Sylt's tap water is <em>not</em> desalinated seawater. It comes from a rain-fed
    freshwater lens ("Süßwasserlinse") up to ~100 m deep. Over-pumping risks letting saltwater seep in — so every drop counts!
    <div style="margin-top:6px;opacity:.7;">Sources: energieversorgung-sylt.de · ven-sylt.de · insel-sylt.de</div>
  </div>

  <div class="overlay" id="overlay">
    <h1>💧 Leaky Bucket Challenge</h1>
    <p>The bucket leaks fast! Tap <strong>SCOOP</strong> to pour water in, and <strong>drag the bucket</strong> to catch falling drops. Fill it to 100% before time runs out.</p>
    <button class="btn" id="startBtn">Start</button>
    <p class="hint">Drag the bucket left/right · catch 💧 for bonus</p>
  </div>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const cv=$('cv'),ctx=cv.getContext('2d');
  let W=0,H=0;
  function resize(){const r=cv.getBoundingClientRect();W=cv.width=r.width;H=cv.height=r.height;}
  new ResizeObserver(resize).observe(cv);resize();
  function buzz(m){if(navigator.vibrate)navigator.vibrate(m);}
  const rand=(a,b)=>a+Math.random()*(b-a);

  // tuning — much harder
  const LEAK=7.5;        // %/sec drains
  const TAP_GAIN=4.2;    // % per scoop tap
  const DROP_GAIN=6;     // % per caught drop
  const DURATION=30;     // seconds

  let fill=0,timeLeft=DURATION,coins=0,running=false,raf=null,last=0,milestone=0;
  let bucket={x:0,w:96,h:78},drops=[],splashes=[],coinFx=[],dropTimer=0,phase=0;

  function start(){
    fill=0;timeLeft=DURATION;coins=0;milestone=0;drops=[];splashes=[];coinFx=[];dropTimer=0;
    bucket.x=W/2;running=true;
    $('overlay').classList.add('hidden');$('coins').textContent=0;
    last=performance.now();if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
  }
  $('startBtn').addEventListener('click',start);

  function bucketTopY(){return H-bucket.h-28;}

  // tap = scoop water (keeps liked water-drop animation)
  function scoop(){
    if(!running)return;
    fill=Math.min(100,fill+TAP_GAIN);buzz(12);
    // drop animation: a few droplets fly into the bucket
    for(let i=0;i<4;i++)splashes.push({x:bucket.x+rand(-20,20),y:bucketTopY()+10,vx:rand(-1,1),vy:rand(-3,-1),life:500,r:rand(2,4)});
    checkMilestone();
  }
  $('tapBtn').addEventListener('click',scoop);

  $('infoBtn').addEventListener('click',()=>$('infoBox').classList.toggle('on'));

  // drag bucket
  let dragging=false;
  function pointerX(e){const r=cv.getBoundingClientRect();const cx=(e.touches?e.touches[0].clientX:e.clientX)-r.left;return cx;}
  function onDown(e){if(!running)return;dragging=true;bucket.x=Math.max(bucket.w/2,Math.min(W-bucket.w/2,pointerX(e)));}
  function onMove(e){if(!dragging)return;e.preventDefault&&e.preventDefault();bucket.x=Math.max(bucket.w/2,Math.min(W-bucket.w/2,pointerX(e)));}
  function onUp(){dragging=false;}
  cv.addEventListener('mousedown',onDown);window.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  cv.addEventListener('touchstart',e=>{onDown(e);},{passive:true});
  cv.addEventListener('touchmove',e=>{onMove(e);},{passive:false});
  window.addEventListener('touchend',onUp);

  function checkMilestone(){
    const m=Math.floor(fill/25);
    if(m>milestone){milestone=m;coins+=5;$('coins').textContent=coins;buzz([10,20,10]);
      for(let i=0;i<14;i++)coinFx.push({x:bucket.x,y:bucketTopY(),vx:rand(-3,3),vy:rand(-5,-1),life:900});}
  }

  function loop(t){raf=requestAnimationFrame(loop);const dt=Math.min(50,t-last);last=t;update(dt);draw();}

  function update(dt){
    if(!running)return;
    phase+=dt*0.004;
    timeLeft-=dt/1000;
    fill=Math.max(0,fill-LEAK*dt/1000);
    // spawn falling drops
    dropTimer+=dt;
    if(dropTimer>520){dropTimer=0;drops.push({x:rand(20,W-20),y:-10,v:rand(2.4,3.8)});}
    for(const d of drops){d.y+=d.v*dt*0.06;}
    // catch
    const by=bucketTopY();
    drops.forEach(d=>{
      if(d.y>by&&d.y<by+24&&Math.abs(d.x-bucket.x)<bucket.w/2){d.caught=true;fill=Math.min(100,fill+DROP_GAIN);buzz(15);
        for(let i=0;i<5;i++)splashes.push({x:d.x,y:by,vx:rand(-1.5,1.5),vy:rand(-3,-1),life:450,r:rand(2,4)});checkMilestone();}
    });
    drops=drops.filter(d=>!d.caught&&d.y<H+20);
    for(const s of splashes){s.x+=s.vx;s.y+=s.vy;s.vy+=0.18;s.life-=dt;}splashes=splashes.filter(s=>s.life>0);
    for(const c of coinFx){c.x+=c.vx;c.y+=c.vy;c.vy+=0.22;c.life-=dt;}coinFx=coinFx.filter(c=>c.life>0);

    $('pfill').style.width=fill+'%';$('pct').textContent=Math.floor(fill)+'%';
    $('time').textContent=Math.max(0,Math.ceil(timeLeft));

    if(fill>=100)return end(true);
    if(timeLeft<=0)return end(false);
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // sea sparkle band
    ctx.fillStyle='#ffffff22';for(let x=0;x<W;x+=26){ctx.fillRect(x+Math.sin(phase+x)*4,H*0.30,12,3);}
    // wet sand sheen
    ctx.fillStyle='#f6c97e';ctx.beginPath();ctx.moveTo(0,H*0.46);for(let x=0;x<=W;x+=20)ctx.lineTo(x,H*0.46+Math.sin(x*0.03+phase)*3);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.fill();
    // falling drops
    for(const d of drops){ctx.fillStyle='#48e0ff';ctx.beginPath();
      ctx.moveTo(d.x,d.y-7);ctx.quadraticCurveTo(d.x+5,d.y+2,d.x,d.y+6);ctx.quadraticCurveTo(d.x-5,d.y+2,d.x,d.y-7);ctx.fill();}
    drawBucket();
    for(const s of splashes){ctx.globalAlpha=Math.max(0,s.life/500);ctx.fillStyle='#9be7ff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,7);ctx.fill();ctx.globalAlpha=1;}
    for(const c of coinFx){ctx.globalAlpha=Math.max(0,c.life/900);ctx.fillStyle='#ffd60a';ctx.beginPath();ctx.arc(c.x,c.y,6,0,7);ctx.fill();
      ctx.fillStyle='#b88900';ctx.font='bold 8px sans-serif';ctx.fillText('€',c.x-2,c.y+3);ctx.globalAlpha=1;}
  }

  function drawBucket(){
    const x=bucket.x,w=bucket.w,h=bucket.h,topY=bucketTopY();
    // bucket body (trapezoid)
    const tlx=x-w/2,trx=x+w/2,blx=x-w*0.36,brx=x+w*0.36,by=topY+h;
    // water inside (wavy, animated)
    const wl=topY+h*(1-fill/100); // water surface y
    ctx.save();
    ctx.beginPath();ctx.moveTo(tlx,topY);ctx.lineTo(trx,topY);ctx.lineTo(brx,by);ctx.lineTo(blx,by);ctx.closePath();ctx.clip();
    ctx.fillStyle='#2aa9ef';
    ctx.beginPath();
    const lx=tlx+(blx-tlx)*((by-wl)/h);
    const rx=trx+(brx-trx)*((by-wl)/h);
    ctx.moveTo(lx-4,wl);
    for(let px=lx; px<=rx; px+=8){ctx.lineTo(px, wl+Math.sin(px*0.12+phase*2)*4);}
    ctx.lineTo(rx,by);ctx.lineTo(lx,by);ctx.closePath();ctx.fill();
    // lighter top shimmer
    ctx.fillStyle='#7fd8ff';
    ctx.beginPath();ctx.moveTo(lx,wl);
    for(let px=lx; px<=rx; px+=8){ctx.lineTo(px, wl+Math.sin(px*0.12+phase*2)*4);}
    for(let px=rx; px>=lx; px-=8){ctx.lineTo(px, wl+6+Math.sin(px*0.12+phase*2)*4);}
    ctx.closePath();ctx.fill();
    ctx.restore();
    // bucket outline + rim
    ctx.lineWidth=5;ctx.strokeStyle='#cf5b2e';
    ctx.beginPath();ctx.moveTo(tlx,topY);ctx.lineTo(trx,topY);ctx.lineTo(brx,by);ctx.lineTo(blx,by);ctx.closePath();ctx.stroke();
    ctx.fillStyle='#e8703a';ctx.fillRect(tlx-3,topY-9,w+6,12);
    ctx.strokeStyle='#a8431f';ctx.lineWidth=3;ctx.beginPath();ctx.arc(x,topY,w*0.42,Math.PI*1.05,Math.PI*1.95);ctx.stroke();
  }

  function end(win){
    running=false;if(raf)cancelAnimationFrame(raf);buzz(win?[20,40,20,40]:80);
    const o=$('overlay');o.classList.remove('hidden');
    o.querySelector('h1').textContent=win?'🎉 Bucket Filled!':'💦 Time\'s Up!';
    o.querySelector('p').textContent=win?('You beat the leak and earned 🪙 '+coins+' coins!'):('You reached '+Math.floor(fill)+'%. The leak won this time — try again!');
    $('startBtn').textContent='Play again';
  }
})();
</script>
</template>
    <template id="game-C4"><style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;font-family:'Trebuchet MS',sans-serif;}
  body{display:flex;align-items:center;justify-content:center;background:#012a4a;overflow:hidden;color:#eaf6ff;}
  #stage{position:relative;width:100%;max-width:460px;height:100%;max-height:780px;}
  canvas{display:block;width:100%;height:100%;}
  .hud{position:absolute;top:8px;left:8px;right:8px;z-index:6;display:flex;justify-content:space-between;gap:8px;align-items:center;pointer-events:none;}
  .chip{background:#00000055;padding:7px 12px;border-radius:18px;font-weight:bold;font-size:.85rem;}
  .bar{flex:1;height:16px;background:#00000044;border-radius:10px;overflow:hidden;position:relative;}
  .bar>div{height:100%;background:linear-gradient(90deg,#ffd166,#06d6a0);transition:width .15s;}
  .dropbtn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:6;padding:16px 40px;border:none;border-radius:40px;
    background:#ffd166;color:#013a63;font-weight:800;font-size:1.15rem;cursor:pointer;box-shadow:0 6px 0 #c79a2e;font-family:inherit;}
  .dropbtn:active{transform:translateX(-50%) translateY(4px);box-shadow:0 2px 0 #c79a2e;}
  .dropbtn:disabled{filter:grayscale(.5) brightness(.85);}
  .screen{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:12px;padding:22px;text-align:center;background:linear-gradient(180deg,#7ec8e3,#012a4a);}
  .screen.hidden{display:none;}
  h1{font-size:1.7rem;text-shadow:0 2px 8px #0006;}
  .btn{width:240px;max-width:82vw;padding:14px;border:none;border-radius:14px;font-size:1.05rem;font-weight:bold;cursor:pointer;
    font-family:inherit;background:#ffd166;color:#013a63;box-shadow:0 5px 0 #c79a2e;}
  .btn:active{transform:translateY(4px);box-shadow:0 1px 0 #c79a2e;}
  .btn.play{background:#06d6a0;color:#04372a;font-size:1.2rem;box-shadow:0 6px 0 #03916c;}
  .small{font-size:.85rem;opacity:.92;max-width:320px;}
  .shopitem{display:flex;justify-content:space-between;align-items:center;gap:10px;width:310px;max-width:90vw;background:#ffffff22;padding:10px 12px;border-radius:12px;margin:4px 0;}
  .shopitem button{border:none;border-radius:10px;padding:8px 12px;font-weight:bold;cursor:pointer;background:#ffd166;color:#013a63;font-family:inherit;}
  .shopitem button:disabled{opacity:.4;}
  .coinrow{font-weight:bold;background:#013a63;padding:8px 18px;border-radius:30px;}
</style>

<div id="stage">
  <canvas id="cv"></canvas>

  <div class="hud" id="hud" style="display:none;">
    <span class="chip">⏳<div class="bar" style="display:inline-block;width:90px;vertical-align:middle;margin-left:4px;"><div id="energy"></div></div></span>
    <span class="chip">🏖 <span id="sand">0</span></span>
  </div>
  <button class="dropbtn" id="dropBtn" style="display:none;">⚓ Drop</button>

  <div class="screen" id="start">
    <h1>⚓ Tilt It</h1>
    <p class="small">Your boat drifts across the bay. Tap <strong>Drop</strong> to lower the hook — the boat holds still while it's down. Grab junk for sand, but <strong>avoid the bombs 💣!</strong> Energy ticks down — collect to survive.</p>
    <div class="coinrow">🏖 Banked sand: <span id="bankStart">0</span></div>
    <button class="btn play" id="playBtn">▶ Set sail</button>
    <button class="btn" id="shopBtn">🛒 Upgrade Shop</button>
  </div>

  <div class="screen hidden" id="shop">
    <h1>🛒 Upgrades</h1>
    <div class="coinrow">🏖 <span id="bankShop">0</span> sand</div>
    <div id="shopList"></div>
    <button class="btn" id="shopBack">⬅ Back</button>
  </div>

  <div class="screen hidden" id="over">
    <h1 id="overTitle">Out of energy!</h1>
    <p class="small" id="overMsg"></p>
    <button class="btn play" id="againBtn">Play again</button>
    <button class="btn" id="overShop">🛒 Shop</button>
  </div>
</div>

<script>
(function(){
  const $=id=>document.getElementById(id);
  const cv=$('cv'),ctx=cv.getContext('2d');
  let W=0,H=0,seaTop=0,floorY=0;
  function resize(){const r=cv.getBoundingClientRect();W=cv.width=r.width;H=cv.height=r.height;seaTop=H*0.16;floorY=H-46;}
  new ResizeObserver(resize).observe(cv);resize();
  function buzz(m){if(navigator.vibrate)navigator.vibrate(m);}
  const rand=(a,b)=>a+Math.random()*(b-a);

  /* upgrades (in-memory, persist across runs) */
  let bank=0;
  const up={rope:0,winch:0,hook:0,motor:0};
  const SHOP=[
    {key:'rope',name:'Longer rope',base:20,desc:'reach deeper',max:5},
    {key:'winch',name:'Faster winch',base:20,desc:'hook moves faster',max:5},
    {key:'hook',name:'Wider hook',base:25,desc:'bigger grab radius',max:4},
    {key:'motor',name:'Efficient motor',base:30,desc:'energy lasts longer',max:4}
  ];
  const cost=it=>Math.round(it.base*Math.pow(1.8,up[it.key]));
  function renderShop(){
    $('bankShop').textContent=bank;$('bankStart').textContent=bank;
    const L=$('shopList');L.innerHTML='';
    SHOP.forEach(it=>{const lvl=up[it.key],maxed=lvl>=it.max,c=cost(it);
      const d=document.createElement('div');d.className='shopitem';
      d.innerHTML='<div style="text-align:left;"><strong>'+it.name+'</strong><br><span class="small">'+it.desc+' · Lv '+lvl+'/'+it.max+'</span></div>';
      const b=document.createElement('button');b.textContent=maxed?'MAX':('🏖 '+c);b.disabled=maxed||bank<c;
      b.addEventListener('click',()=>{if(!maxed&&bank>=c){bank-=c;up[it.key]++;renderShop();}});
      d.appendChild(b);L.appendChild(d);});
  }
  $('shopBtn').addEventListener('click',()=>{renderShop();$('start').classList.add('hidden');$('shop').classList.remove('hidden');});
  $('overShop').addEventListener('click',()=>{$('over').classList.add('hidden');renderShop();$('shop').classList.remove('hidden');});
  $('shopBack').addEventListener('click',()=>{$('shop').classList.add('hidden');$('start').classList.remove('hidden');$('bankStart').textContent=bank;});

  /* game state */
  let boat,hook,junk,energy,maxEnergy,sand,running,raf,last,driftTarget,driftT,shake;
  const JUNK_TYPES=['can','bottle','tire','crate','bomb'];

  function startGame(){
    $('start').classList.add('hidden');$('shop').classList.add('hidden');$('over').classList.add('hidden');
    $('hud').style.display='flex';$('dropBtn').style.display='block';$('dropBtn').disabled=false;
    boat={x:W/2,vx:0};
    hook={state:'idle',y:seaTop,x:W/2,caught:null};
    junk=[];maxEnergy=100;energy=maxEnergy;sand=0;shake=0;
    driftTarget=rand(W*0.2,W*0.8);driftT=0;
    for(let i=0;i<7;i++)spawnJunk(rand(seaTop+40,floorY-20));
    running=true;last=performance.now();
    if(raf)cancelAnimationFrame(raf);raf=requestAnimationFrame(loop);
  }
  function spawnJunk(y){
    const depthBias=Math.random();
    const type=Math.random()<0.22?'bomb':JUNK_TYPES[Math.floor(Math.random()*4)];
    junk.push({type,x:rand(20,W-20),y:y!=null?y:rand(seaTop+40,floorY-20),
      vx:rand(-.5,.5)||0.3,rot:rand(0,6),size:rand(.85,1.2)});
  }

  $('dropBtn').addEventListener('click',()=>{
    if(!running)return;
    if(hook.state==='idle'){hook.state='down';hook.x=boat.x;hook.y=seaTop;hook.caught=null;buzz(15);$('dropBtn').disabled=true;}
  });

  function loop(t){raf=requestAnimationFrame(loop);const dt=Math.min(50,t-last);last=t;update(dt);draw();}

  const ropeLen=()=>seaTop+ (floorY-seaTop)*(0.5+0.1*up.rope);
  const winchSpd=()=>1.6+0.5*up.winch;
  const hookR=()=>16+5*up.hook;
  const motorDrain=()=>0.9 - 0.13*up.motor; // energy/sec

  function update(dt){
    if(!running)return;
    // energy drains; bombs/idle cost; collecting refunds
    energy-=motorDrain()*dt/1000;
    if(energy<=0){return end();}

    // boat drift — non-linear: eased toward wandering target + sine sway, only when anchor is up
    if(hook.state==='idle'){
      driftT+=dt;
      if(driftT>rand(1200,2600)){driftT=0;driftTarget=rand(W*0.15,W*0.85);}
      const desired=driftTarget+Math.sin(performance.now()*0.0012)*30;
      const ax=(desired-boat.x)*0.0008*dt;     // acceleration toward target
      boat.vx=(boat.vx+ax)*0.96;               // momentum + drag (eased, non-linear)
      boat.x+=boat.vx*dt;
      boat.x=Math.max(40,Math.min(W-40,boat.x));
    } // else: boat STOPS while anchor deployed

    // hook movement
    if(hook.state==='down'){
      hook.y+=winchSpd()*dt*0.06;
      // grab check
      for(const j of junk){if(!j.taken&&Math.abs(j.x-hook.x)<hookR()&&Math.abs(j.y-hook.y)<hookR()){
        if(j.type==='bomb'){j.taken=true;energy=Math.max(0,energy-22);shake=12;buzz([40,30,60]);hook.state='up';}
        else{j.taken=true;hook.caught=j;hook.state='up';buzz(20);}
        break;}}
      if(hook.y>=ropeLen()){hook.state='up';}
    } else if(hook.state==='up'){
      hook.y-=winchSpd()*dt*0.075;
      if(hook.caught){hook.caught.x=hook.x;hook.caught.y=hook.y;}
      if(hook.y<=seaTop){hook.y=seaTop;hook.state='idle';$('dropBtn').disabled=false;
        if(hook.caught){const v={can:3,bottle:4,tire:6,crate:8}[hook.caught.type]||3;
          sand+=v;energy=Math.min(maxEnergy,energy+5);
          junk=junk.filter(j=>j!==hook.caught);hook.caught=null;}}
    }

    // junk drift + dynamic faster respawn
    for(const j of junk){if(j.taken&&j!==hook.caught)continue;j.x+=j.vx*dt*0.03;if(j.x<14||j.x>W-14)j.vx*=-1;j.rot+=dt*0.0006;}
    junk=junk.filter(j=>!(j.taken&&j!==hook.caught));
    while(junk.length<9)spawnJunk(); // keep the bay full, spawns continuously & fast

    if(shake>0)shake-=dt*0.05;
    $('energy').style.width=(energy/maxEnergy*100)+'%';
    $('sand').textContent=sand;
  }

  /* drawing */
  function draw(){
    ctx.save();
    if(shake>0)ctx.translate(rand(-shake,shake),rand(-shake,shake));
    // sky
    const sky=ctx.createLinearGradient(0,0,0,seaTop);sky.addColorStop(0,'#bfe8ff');sky.addColorStop(1,'#8fd0ee');
    ctx.fillStyle=sky;ctx.fillRect(0,0,W,seaTop+4);
    // sea
    const sea=ctx.createLinearGradient(0,seaTop,0,H);sea.addColorStop(0,'#2a9bd0');sea.addColorStop(1,'#013a63');
    ctx.fillStyle=sea;ctx.fillRect(0,seaTop,W,H-seaTop);
    // wavy surface
    ctx.strokeStyle='#ffffff55';ctx.lineWidth=2;ctx.beginPath();
    for(let x=0;x<=W;x+=10)ctx.lineTo(x,seaTop+Math.sin(x*0.05+performance.now()*0.003)*3);ctx.stroke();
    // WAVY sand floor (dunes, not flat)
    ctx.fillStyle='#d9b46a';ctx.beginPath();ctx.moveTo(0,H);
    for(let x=0;x<=W;x+=20)ctx.lineTo(x,floorY+Math.sin(x*0.04+1)*10+Math.sin(x*0.13)*4);
    ctx.lineTo(W,H);ctx.closePath();ctx.fill();
    ctx.fillStyle='#c79e54';for(let x=10;x<W;x+=46){ctx.beginPath();ctx.arc(x,floorY+10+Math.sin(x*0.04+1)*10,3,0,7);ctx.fill();}

    // junk
    for(const j of junk){if(j.taken&&j!==hook.caught)continue;drawJunk(j);}
    // rope + hook
    ctx.strokeStyle='#6b4f2a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(boat.x,seaTop-6);
    const hx=(hook.state==='idle')?boat.x:hook.x;ctx.lineTo(hx,hook.y);ctx.stroke();
    drawHook(hx,hook.y);
    // boat
    drawBoat(boat.x,seaTop-6);
    ctx.restore();
  }
  function drawBoat(x,y){ctx.save();ctx.translate(x,y);
    ctx.fillStyle='#c1440e';ctx.beginPath();ctx.moveTo(-34,0);ctx.lineTo(34,0);ctx.lineTo(24,16);ctx.lineTo(-24,16);ctx.closePath();ctx.fill();
    ctx.fillStyle='#8a300a';ctx.fillRect(-34,-4,68,5);
    ctx.fillStyle='#ffd166';ctx.fillRect(-6,-22,3,20);ctx.beginPath();ctx.moveTo(-3,-22);ctx.lineTo(16,-14);ctx.lineTo(-3,-8);ctx.closePath();ctx.fill();
    ctx.restore();}
  function drawHook(x,y){ctx.save();ctx.translate(x,y);ctx.strokeStyle='#bbbbbb';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(0,0,7,Math.PI*0.1,Math.PI*1.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(5,5);ctx.lineTo(2,11);ctx.stroke();ctx.restore();}
  function drawJunk(j){ctx.save();ctx.translate(j.x,j.y);ctx.rotate(Math.sin(j.rot)*0.3);ctx.scale(j.size,j.size);
    switch(j.type){
      case 'can':
        ctx.fillStyle='#b0bec5';ctx.fillRect(-7,-11,14,22);ctx.fillStyle='#ef5350';ctx.fillRect(-7,-3,14,7);
        ctx.fillStyle='#eceff1';ctx.fillRect(-7,-11,14,3);break;
      case 'bottle':
        ctx.fillStyle='#66bb6a';ctx.beginPath();ctx.moveTo(-6,12);ctx.lineTo(6,12);ctx.lineTo(6,-4);ctx.lineTo(3,-12);ctx.lineTo(-3,-12);ctx.lineTo(-6,-4);ctx.closePath();ctx.fill();
        ctx.fillStyle='#fff59d';ctx.fillRect(-6,0,12,6);ctx.fillStyle='#33691e';ctx.fillRect(-2,-16,4,5);break;
      case 'tire':
        ctx.fillStyle='#263238';ctx.beginPath();ctx.arc(0,0,13,0,7);ctx.fill();ctx.fillStyle='#90a4ae';ctx.beginPath();ctx.arc(0,0,6,0,7);ctx.fill();
        ctx.strokeStyle='#000';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,13,0,7);ctx.stroke();break;
      case 'crate':
        ctx.fillStyle='#a1672f';ctx.fillRect(-12,-12,24,24);ctx.strokeStyle='#6e4520';ctx.lineWidth=3;ctx.strokeRect(-12,-12,24,24);
        ctx.beginPath();ctx.moveTo(-12,-12);ctx.lineTo(12,12);ctx.moveTo(12,-12);ctx.lineTo(-12,12);ctx.stroke();break;
      case 'bomb':
        ctx.fillStyle='#212121';ctx.beginPath();ctx.arc(0,2,12,0,7);ctx.fill();
        ctx.fillStyle='#616161';ctx.fillRect(-3,-12,6,5);
        ctx.strokeStyle='#ff7043';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,-12);ctx.quadraticCurveTo(8,-18,5,-22);ctx.stroke();
        ctx.fillStyle='#ffd166';ctx.beginPath();ctx.arc(5,-22,2.5,0,7);ctx.fill();
        ctx.fillStyle='#fff';ctx.font='bold 9px sans-serif';ctx.fillText('!',-2,6);break;
    }
    ctx.restore();}

  function end(){running=false;if(raf)cancelAnimationFrame(raf);bank+=sand;buzz(80);
    $('overTitle').textContent='Out of energy!';
    $('overMsg').textContent='You collected 🏖 '+sand+' sand this run. Banked total: '+bank+'. Spend it in the shop!';
    $('hud').style.display='none';$('dropBtn').style.display='none';$('over').classList.remove('hidden');}

  $('playBtn').addEventListener('click',startGame);
  $('againBtn').addEventListener('click',startGame);
})();
</script>
</template>

</body>
</html>

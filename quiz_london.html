<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Quiz Collection – Year 7</title>
<style>
/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { min-height: 100%; font-family: 'Georgia', serif; }
body { background: #f0f4f8; color: #1f2937; line-height: 1.5; }
button { font-family: inherit; cursor: pointer; border: none; outline: none; }

/* ============================================================
   LANGUAGE TOGGLE  — fixed top-right on every screen
   ============================================================ */
#lang-toggle {
  position: fixed;
  top: 14px; right: 14px;
  z-index: 20000;
  background: rgba(255,255,255,0.92);
  border: 2px solid rgba(255,255,255,0.6);
  border-radius: 30px;
  padding: 5px 6px;
  display: flex;
  gap: 4px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  backdrop-filter: blur(6px);
}
#lang-toggle button {
  padding: 5px 13px;
  border-radius: 24px;
  font-size: 0.82rem;
  font-weight: 700;
  letter-spacing: 0.5px;
  transition: all 0.18s;
  background: transparent;
  color: #374151;
}
#lang-toggle button.active {
  background: #b91c1c;
  color: #fff;
  box-shadow: 0 2px 8px rgba(185,28,28,0.4);
}
#lang-toggle button:hover:not(.active) { background: rgba(185,28,28,0.1); }

/* ============================================================
   BACK BUTTON — fixed top-left on quiz / sub-menu screens
   ============================================================ */
#back-btn {
  position: fixed;
  top: 14px; left: 14px;
  background: rgba(0,0,0,0.52);
  color: #fff;
  padding: 8px 16px;
  border-radius: 24px;
  font-size: 0.88rem;
  z-index: 19000;
  backdrop-filter: blur(4px);
  display: none;
  transition: background 0.15s;
}
#back-btn:hover { background: rgba(0,0,0,0.82); }

/* ============================================================
   SCREENS — one active at a time
   ============================================================ */
.screen { display: none; min-height: 100vh; }
.screen.active { display: block; }

/* ============================================================
   MAIN MENU — 4 big category buttons
   ============================================================ */
#screen-main {
  background: linear-gradient(135deg, #b91c1c 0%, #1e3a8a 55%, #7c2d12 100%);
  padding: 60px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
#screen-main h1 {
  text-align: center;
  color: #fff;
  font-size: 2.4rem;
  margin-bottom: 8px;
  text-shadow: 0 4px 18px rgba(0,0,0,0.4);
  letter-spacing: 1px;
}
#screen-main .subtitle {
  text-align: center;
  color: #fde68a;
  font-size: 1.05rem;
  margin-bottom: 48px;
  font-style: italic;
}
.big-topic-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 22px;
  max-width: 1000px;
  width: 100%;
}
.big-topic-btn {
  background: rgba(255,255,255,0.95);
  border-radius: 20px;
  padding: 32px 26px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 24px rgba(0,0,0,0.22);
  text-align: center;
  border: none;
  width: 100%;
  position: relative;
  overflow: hidden;
}
.big-topic-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(185,28,28,0.07) 0%, rgba(30,58,138,0.07) 100%);
  border-radius: 20px;
}
.big-topic-btn:hover { transform: translateY(-6px); box-shadow: 0 18px 40px rgba(0,0,0,0.32); }
.big-topic-btn .topic-icon { font-size: 3rem; margin-bottom: 12px; display: block; }
.big-topic-btn h2 { font-size: 1.3rem; color: #111827; margin-bottom: 6px; }
.big-topic-btn .topic-desc { font-size: 0.88rem; color: #6b7280; font-style: italic; }
.big-topic-btn .quiz-count {
  display: inline-block;
  margin-top: 14px;
  background: #b91c1c;
  color: #fff;
  font-size: 0.78rem;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}

/* ============================================================
   SUB-MENU — quiz list for a chosen topic
   ============================================================ */
#screen-submenu {
  background: linear-gradient(135deg, #b91c1c 0%, #1e3a8a 55%, #7c2d12 100%);
  padding: 80px 20px 60px;
}
#screen-submenu .submenu-header {
  text-align: center;
  color: #fff;
  font-size: 2rem;
  margin-bottom: 8px;
  text-shadow: 0 3px 14px rgba(0,0,0,0.35);
}
#screen-submenu .submenu-sub {
  text-align: center;
  color: #fde68a;
  font-size: 0.95rem;
  margin-bottom: 36px;
  font-style: italic;
}
.quiz-cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 18px;
  max-width: 1000px;
  margin: 0 auto;
}
.quiz-card {
  background: rgba(255,255,255,0.97);
  border-radius: 16px;
  padding: 22px 20px;
  cursor: pointer;
  transition: transform 0.18s, box-shadow 0.18s;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
  border: none;
  text-align: left;
  width: 100%;
}
.quiz-card:hover { transform: translateY(-4px); box-shadow: 0 14px 32px rgba(0,0,0,0.28); }
.quiz-card.coming-soon { opacity: 0.62; cursor: not-allowed; }
.quiz-card.coming-soon:hover { transform: none; box-shadow: 0 6px 18px rgba(0,0,0,0.18); }
.quiz-card .qc-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: #b91c1c; color: #fff;
  width: 32px; height: 32px; border-radius: 50%;
  font-weight: 700; font-size: 0.9rem;
  margin-bottom: 10px;
}
.quiz-card h3 { font-size: 1.05rem; color: #111827; margin-bottom: 5px; }
.quiz-card .qc-desc { color: #4b5563; font-size: 0.87rem; margin-bottom: 6px; }
.quiz-card .qc-authors { color: #9ca3af; font-size: 0.77rem; font-style: italic; }
.quiz-card .soon-tag {
  display: inline-block;
  background: #fef3c7; color: #92400e;
  font-size: 0.74rem; font-weight: 700;
  padding: 3px 10px; border-radius: 8px;
  margin-top: 8px;
}

/* ============================================================
   QUIZ SCREENS — generic wrappers
   ============================================================ */
.quiz-screen { display: none; min-height: 100vh; }
.quiz-screen.active { display: block; }

/* ============================================================
   QUIZ A1 — City Hunter  (walking simulator / cartoon)
   ============================================================ */
#quiz-a1 {
  min-height:100vh; overflow:hidden; position:relative;
  font-family:'Fredoka','Comic Sans MS','Chalkboard SE',cursive;
  background:#87ceeb;
}
/* Walking Scene */
#quiz-a1 .walk-scene {
  position:relative; width:100%; height:100vh; overflow:hidden;
}
#quiz-a1 .sky-layer {
  position:absolute; inset:0;
  background:linear-gradient(180deg,#4fc3f7 0%,#81d4fa 40%,#b3e5fc 60%,#e1f5fe 80%);
}
#quiz-a1 .sun { position:fixed; top:20px; right:120px; font-size:3.8rem; animation:spinSun 14s linear infinite; z-index:2; pointer-events:none; }
@keyframes spinSun { to { transform:rotate(360deg); } }
#quiz-a1 .cloud-layer { position:absolute; top:0; width:100%; height:40%; z-index:2; pointer-events:none; }
#quiz-a1 .cloud-float { position:absolute; font-size:3rem; opacity:0.7; animation:floatCld 30s linear infinite; }
@keyframes floatCld { 0%{transform:translateX(-200px)} 100%{transform:translateX(calc(100vw+200px))} }
#quiz-a1 .buildings-layer {
  position:absolute; bottom:30%; width:300%; height:40%; z-index:3;
  animation:scrollBld var(--walk-dur,10s) linear forwards;
  animation-play-state:var(--walk-play,paused);
}
@keyframes scrollBld { from{transform:translateX(0)} to{transform:translateX(-33.33%)} }
#quiz-a1 .bld-strip { display:flex; align-items:flex-end; height:100%; }
#quiz-a1 .bld {
  flex-shrink:0; margin:0 3px; border-radius:4px 4px 0 0; position:relative;
}
#quiz-a1 .bld .win {
  width:8px; height:8px; background:rgba(255,255,200,0.7); border-radius:1px;
  position:absolute;
}
#quiz-a1 .road-layer {
  position:absolute; bottom:0; width:100%; height:30%; z-index:4;
  background:linear-gradient(180deg,#666 0%,#555 10%,#444 100%);
}
#quiz-a1 .road-line {
  position:absolute; top:45%; height:4px; width:300%;
  background:repeating-linear-gradient(90deg,#fbbf24 0,#fbbf24 40px,transparent 40px,transparent 80px);
  animation:scrollRoad var(--walk-dur,10s) linear forwards;
  animation-play-state:var(--walk-play,paused);
}
@keyframes scrollRoad { from{transform:translateX(0)} to{transform:translateX(-33.33%)} }
#quiz-a1 .sidewalk {
  position:absolute; top:0; width:100%; height:18%;
  background:repeating-linear-gradient(90deg,#d1d5db 0,#d1d5db 30px,#e5e7eb 30px,#e5e7eb 60px);
}
/* Car */
#quiz-a1 .car-anim {
  position:absolute; bottom:34%; z-index:6; font-size:2.2rem;
  animation:carPass 4s linear forwards;
}
@keyframes carPass { from{left:-80px} to{left:calc(100vw+80px)} }
/* Character SVG */
#quiz-a1 .char-wrap {
  position:absolute; bottom:30%; left:50%; transform:translateX(-50%);
  z-index:10; width:60px;
}
#quiz-a1 .char-wrap.walking .char-leg-l { animation:legWalk 0.35s steps(2) infinite; }
#quiz-a1 .char-wrap.walking .char-leg-r { animation:legWalk 0.35s steps(2) infinite 0.175s; }
@keyframes legWalk { 0%{transform:rotate(-15deg)} 50%{transform:rotate(15deg)} 100%{transform:rotate(-15deg)} }
/* Walk HUD */
#quiz-a1 .walk-hud {
  position:absolute; top:0; left:0; right:0; z-index:15;
  padding:56px 18px 10px; display:flex; justify-content:space-between; align-items:flex-start;
}
#quiz-a1 .hud-coins {
  background:rgba(255,255,255,0.9); border-radius:24px; padding:6px 16px;
  font-size:1rem; font-weight:700; color:#92400e; box-shadow:0 2px 8px rgba(0,0,0,0.15);
  display:flex; align-items:center; gap:6px;
}
#quiz-a1 .hud-info {
  background:rgba(0,0,0,0.5); color:#fff; border-radius:16px; padding:6px 16px;
  font-size:0.88rem; text-align:center; backdrop-filter:blur(4px);
}
#quiz-a1 .walk-dest {
  position:absolute; bottom:32%; left:50%; transform:translateX(-50%);
  z-index:12; text-align:center;
  background:rgba(255,255,255,0.92); border-radius:16px; padding:10px 24px;
  box-shadow:0 4px 14px rgba(0,0,0,0.2); font-size:1rem; font-weight:700; color:#1e3a8a;
}
#quiz-a1 .walk-timer {
  position:absolute; bottom:12%; left:50%; transform:translateX(-50%);
  z-index:12; width:200px; text-align:center;
}
#quiz-a1 .timer-bar { background:rgba(255,255,255,0.4); border-radius:10px; height:10px; overflow:hidden; }
#quiz-a1 .timer-fill { height:100%; background:linear-gradient(90deg,#f59e0b,#b91c1c); border-radius:10px; transition:width 1s linear; }
#quiz-a1 .timer-text { font-size:0.8rem; color:#fff; margin-top:4px; text-shadow:0 1px 3px rgba(0,0,0,0.5); }
/* Sight arrival */
#quiz-a1 .sight-card {
  position:absolute; inset:0; z-index:20;
  background:rgba(0,0,0,0.55); display:flex; align-items:center; justify-content:center;
  backdrop-filter:blur(3px);
}
#quiz-a1 .sight-inner {
  background:rgba(255,255,255,0.97); border-radius:22px; padding:28px 26px;
  max-width:680px; width:90%; box-shadow:0 12px 40px rgba(0,0,0,0.3);
  border:3px solid #fbbf24; max-height:90vh; overflow-y:auto;
}
#quiz-a1 .sight-header { display:flex; align-items:center; gap:12px; margin-bottom:16px; }
#quiz-a1 .sight-icon { font-size:2.5rem; }
#quiz-a1 .sight-name { font-size:1.4rem; color:#b91c1c; font-weight:700; }
#quiz-a1 .q-count { font-size:0.86rem; color:#6b7280; margin-bottom:10px; }
#quiz-a1 .question-text { font-size:1.08rem; color:#111827; margin-bottom:14px; line-height:1.5; }
#quiz-a1 .options { display:flex; flex-direction:column; gap:10px; margin-bottom:12px; }
#quiz-a1 .opt-btn {
  background:#dbeafe; color:#1e40af; padding:12px 16px; border-radius:12px;
  font-size:0.98rem; font-family:inherit; border:2px solid transparent;
  text-align:left; transition:all 0.15s;
}
#quiz-a1 .opt-btn:hover:not(:disabled) { background:#93c5fd; border-color:#2563eb; }
#quiz-a1 .opt-btn.correct { background:#bbf7d0; border-color:#16a34a; }
#quiz-a1 .opt-btn.wrong   { background:#fecaca; border-color:#dc2626; }
#quiz-a1 .opt-btn:disabled { cursor:not-allowed; }
#quiz-a1 .feedback-box { border-radius:12px; padding:12px 16px; font-size:0.97rem; display:none; margin-bottom:12px; }
#quiz-a1 .feedback-box.show { display:block; }
#quiz-a1 .feedback-box.correct { background:#f0fdf4; border-left:4px solid #16a34a; color:#15803d; }
#quiz-a1 .feedback-box.wrong   { background:#fef2f2; border-left:4px solid #dc2626; color:#991b1b; }
#quiz-a1 .nav-btn { background:#1e40af; color:#fff; padding:10px 24px; border-radius:10px; font-size:0.98rem; font-family:inherit; }
#quiz-a1 .nav-btn:hover { background:#1e3a8a; }
#quiz-a1 .shop-btn { background:#f59e0b; color:#fff; padding:8px 16px; border-radius:10px; font-size:0.88rem; font-family:inherit; }
/* Loser popup */
#quiz-a1 .loser-popup {
  position:fixed; inset:0; background:rgba(0,0,0,0.6);
  display:none; align-items:center; justify-content:center;
  z-index:18000; flex-direction:column;
}
#quiz-a1 .loser-popup.show { display:flex; }
#quiz-a1 .loser-face { font-size:5.5rem; animation:bLoser 0.4s ease infinite alternate; margin-bottom:8px; }
@keyframes bLoser { from{transform:scale(1)} to{transform:scale(1.15)} }
#quiz-a1 .loser-text { font-size:2.2rem; color:#fbbf24; font-weight:900; text-shadow:2px 2px 0 #000; margin-bottom:18px; }
#quiz-a1 .loser-close { background:#b91c1c; color:#fff; padding:10px 28px; border-radius:12px; font-size:1rem; font-family:inherit; }
/* Shop overlay */
#quiz-a1 .shop-overlay {
  position:fixed; inset:0; background:rgba(0,0,0,0.75);
  z-index:18500; display:none; align-items:flex-start;
  justify-content:center; overflow-y:auto; padding:30px 18px;
}
#quiz-a1 .shop-overlay.show { display:flex; }
#quiz-a1 .shop-panel { background:#fffbeb; border-radius:20px; padding:24px; max-width:680px; width:100%; border:3px solid #fbbf24; }
#quiz-a1 .shop-panel h2 { text-align:center; color:#92400e; margin-bottom:16px; font-size:1.5rem; }
#quiz-a1 .shop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(130px,1fr)); gap:12px; }
#quiz-a1 .shop-item {
  background:#fff; border-radius:12px; padding:12px 8px; text-align:center;
  border:2px solid #fde68a; font-family:inherit; cursor:pointer; transition:all 0.15s;
}
#quiz-a1 .shop-item:hover { border-color:#f59e0b; transform:scale(1.04); }
#quiz-a1 .shop-item.owned { background:#f0fdf4; border-color:#16a34a; }
#quiz-a1 .shop-item.equipped { background:#dbeafe; border-color:#2563eb; }
#quiz-a1 .shop-item .si-preview { height:70px; display:flex; align-items:center; justify-content:center; margin-bottom:6px; }
#quiz-a1 .shop-item .si-name { font-size:0.78rem; color:#374151; font-weight:600; }
#quiz-a1 .shop-item .si-price { font-size:0.75rem; color:#f59e0b; margin-top:2px; }
#quiz-a1 .close-shop { display:block; margin:14px auto 0; background:#b91c1c; color:#fff; padding:9px 26px; border-radius:10px; font-size:0.95rem; font-family:inherit; }
/* Start screen */
#quiz-a1 .start-card { background:rgba(255,255,255,0.97); border-radius:24px; padding:36px 28px; box-shadow:0 10px 40px rgba(0,0,0,0.2); border:3px solid #fbbf24; text-align:center; }
#quiz-a1 .start-card h2 { font-size:1.9rem; color:#b91c1c; margin-bottom:12px; }
#quiz-a1 .start-card p { color:#374151; font-size:0.98rem; margin-bottom:6px; }
#quiz-a1 .start-btn { background:linear-gradient(135deg,#f59e0b,#b91c1c); color:#fff; padding:13px 34px; border-radius:14px; font-size:1.1rem; font-family:inherit; margin-top:18px; box-shadow:0 4px 14px rgba(185,28,28,0.4); }
#quiz-a1 .start-btn:hover { transform:scale(1.04); }
#quiz-a1 .char-display { display:flex; justify-content:center; margin:10px 0; }
/* Building done card */
#quiz-a1 .done-overlay {
  position:absolute; inset:0; z-index:20;
  background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center;
}
#quiz-a1 .done-card { background:#fff; border-radius:20px; padding:30px; text-align:center; max-width:500px; width:90%; border:3px solid #fbbf24; }
/* Final end screen */
#quiz-a1 .end-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(180deg,#87ceeb,#b6f0a0);
  padding:20px;
}


/* ============================================================
   QUIZ A2 — Super London  (white / red / gold)
   ============================================================ */
#quiz-a2 { min-height: 100vh; position: relative; overflow: hidden; background: #fff; }
#quiz-a2 .gold-top { position:fixed; top:0; left:0; right:0; height:6px; background:linear-gradient(90deg,#b91c1c,#d97706,#b91c1c); z-index:100; }
#quiz-a2 .gold-bot { position:fixed; bottom:0; left:0; right:0; height:6px; background:linear-gradient(90deg,#b91c1c,#d97706,#b91c1c); z-index:100; }
#quiz-a2 .bg-pattern {
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background: repeating-linear-gradient(-45deg, rgba(185,28,28,0.035) 0,rgba(185,28,28,0.035) 18px, transparent 18px, transparent 36px);
}
#quiz-a2 .content-wrap { position:relative; z-index:2; max-width:800px; margin:0 auto; padding:50px 20px 70px; }
#quiz-a2 .game-title { text-align:center; font-size:2.1rem; color:#b91c1c; margin-bottom:6px; font-family:'Georgia',serif; letter-spacing:1px; text-shadow:1px 1px 0 #d97706; }
#quiz-a2 .prog-wrap { background:#f3f4f6; border-radius:10px; height:10px; margin-bottom:22px; overflow:hidden; border:1px solid #e5e7eb; }
#quiz-a2 .prog-fill { height:100%; background:linear-gradient(90deg,#b91c1c,#d97706); border-radius:10px; transition:width 0.5s; }
#quiz-a2 .question-card { background:rgba(255,255,255,0.98); border-radius:18px; padding:24px; box-shadow:0 8px 30px rgba(185,28,28,0.12); border:2px solid #fde68a; display:flex; gap:20px; align-items:flex-start; }
#quiz-a2 .q-img-col { flex:0 0 190px; text-align:center; }
#quiz-a2 .q-img-emoji { font-size:4.5rem; display:flex; align-items:center; justify-content:center; width:180px; height:150px; border-radius:12px; background:#fef3c7; box-shadow:0 4px 14px rgba(0,0,0,0.1); }
#quiz-a2 .q-body { flex:1; }
#quiz-a2 .q-num { color:#9ca3af; font-size:0.84rem; margin-bottom:5px; }
#quiz-a2 .q-text { font-size:1.08rem; color:#111827; margin-bottom:14px; font-weight:600; }
#quiz-a2 .tf-btns { display:flex; gap:12px; }
#quiz-a2 .tf-btn { flex:1; padding:12px; border-radius:12px; font-size:0.97rem; font-weight:700; border:2px solid transparent; font-family:inherit; transition:all 0.15s; }
#quiz-a2 .tf-btn.t-btn { background:#dbeafe; color:#1e40af; }
#quiz-a2 .tf-btn.f-btn { background:#fce7f3; color:#9d174d; }
#quiz-a2 .tf-btn:hover:not(:disabled) { transform:scale(1.04); }
#quiz-a2 .tf-btn.correct { background:#bbf7d0; border-color:#16a34a; color:#15803d; }
#quiz-a2 .tf-btn.wrong   { background:#fecaca; border-color:#dc2626; color:#991b1b; }
#quiz-a2 .tf-btn:disabled { cursor:not-allowed; }
#quiz-a2 .mc-opts { display:flex; flex-direction:column; gap:8px; }
#quiz-a2 .mc-opt { background:#f3f4f6; color:#374151; padding:10px 14px; border-radius:10px; text-align:left; font-size:0.95rem; border:2px solid transparent; font-family:inherit; transition:all 0.15s; }
#quiz-a2 .mc-opt:hover:not(:disabled) { background:#e5e7eb; border-color:#9ca3af; }
#quiz-a2 .mc-opt.correct { background:#bbf7d0; border-color:#16a34a; color:#15803d; }
#quiz-a2 .mc-opt.wrong   { background:#fecaca; border-color:#dc2626; color:#991b1b; }
#quiz-a2 .mc-opt:disabled { cursor:not-allowed; }
#quiz-a2 .tip-box { margin-top:12px; padding:10px 14px; background:#fffbeb; border-radius:10px; border-left:4px solid #d97706; font-size:0.88rem; color:#92400e; display:none; }
#quiz-a2 .tip-box.show { display:block; }
#quiz-a2 .next-btn { background:linear-gradient(135deg,#b91c1c,#d97706); color:#fff; padding:10px 24px; border-radius:10px; font-size:0.95rem; font-family:inherit; margin-top:14px; display:none; }
#quiz-a2 .next-btn.show { display:inline-block; }
#quiz-a2 .score-disp { text-align:center; font-size:0.96rem; color:#6b7280; margin-bottom:14px; }

let lang = 'en';

function t(key, vars) {
  let s = (T[lang][key] !== undefined ? T[lang][key] : T['en'][key]) || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => { s = s.replace('{'+k+'}', v); });
  return s;
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l==='en');
  document.getElementById('btn-de').classList.toggle('active', l==='de');
  // Update all data-i elements visible right now
  document.querySelectorAll('[data-i]').forEach(el => {
    const k = el.getAttribute('data-i');
    if (T[l][k] !== undefined) el.textContent = T[l][k];
  });
  // Re-render active quiz content if needed
  const active = document.querySelector('.screen.active');
  if (active && active.id !== 'screen-main' && active.id !== 'screen-submenu') {
    rerenderActive(active.id);
  }
  if (active && active.id === 'screen-submenu') {
    rerenderSubmenu();
  }
}

function rerenderActive(id) {
  switch(id) {
    case 'quiz-a1': renderA1Quiz && typeof renderA1Quiz === 'function' && renderA1QuizIfActive(); break;
    case 'quiz-a2': if(typeof a2State!=='undefined') renderA2(); break;
    case 'quiz-a3': if(typeof a3State!=='undefined') renderA3(); break;
    case 'quiz-a4': if(typeof a4State!=='undefined') { if(a4State.screen==='start') renderA4Start(); else renderA4Quiz(); } break;
    case 'quiz-a5': if(typeof a5State!=='undefined') renderA5(); break;
    case 'quiz-b1': if(typeof b1State!=='undefined') renderB1(); break;
    case 'quiz-c1': if(typeof c1State!=='undefined') renderC1(); break;
    case 'quiz-d1': if(typeof d1State!=='undefined') renderD1(); break;
  }
}
function renderA1QuizIfActive() {
  if(typeof a1State !== 'undefined' && a1State.started) renderA1Quiz();
}

/* =====================================================================
   NAVIGATION
   ===================================================================== */
let navHistory = []; // stack of screen ids
let currentTopic = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
  const isMain = id === 'screen-main';
  document.getElementById('back-btn').style.display = isMain ? 'none' : 'block';
}

function openTopic(topic) {
  currentTopic = topic;
  navHistory = ['screen-main'];
  buildSubmenu(topic);
  showScreen('screen-submenu');
}

function goBack() {
  if (navHistory.length === 0) { showScreen('screen-main'); return; }
  const prev = navHistory.pop();
  if (prev === 'screen-submenu') {
    rerenderSubmenu();
    showScreen('screen-submenu');
  } else {
    showScreen(prev || 'screen-main');
  }
}

function launchQuiz(qid, initFn) {
  navHistory.push('screen-submenu');
  showScreen(qid);
  if (initFn) initFn();
}

function buildSubmenu(topic) {
  const cfg = topicConfig[topic];
  document.getElementById('sub-title').textContent = t(cfg.titleKey);
  document.getElementById('sub-subtitle').textContent = t('selectQuiz');
  const grid = document.getElementById('sub-cards');
  grid.innerHTML = cfg.quizzes.map((q) => {
    const cs = q.coming ? ` coming-soon` : '';
    const soonTag = q.coming ? `<div class="soon-tag">${q.coming==='monday'?t('comingMonday'):t('comingSoon')}</div>` : '';
    const onclick = q.coming ? `onclick="alert('${q.coming==='monday'?t('comingMonday'):t('comingSoon')}')"` : `onclick="launchQuiz('${q.id}', ${q.init})"`;
    return `<button class="quiz-card${cs}" ${onclick}>
      <div class="qc-badge">${q.badge}</div>
      <h3>${t(q.nameKey)}</h3>
      <div class="qc-desc">${t(q.descKey)}</div>
      <div class="qc-authors">${t(q.authKey)}</div>
      ${soonTag}
    </button>`;
  }).join('');
}

function rerenderSubmenu() {
  if (currentTopic) buildSubmenu(currentTopic);
}

  {name:'Superhero',shirt:'#dc2626',pants:'#1e40af',shoes:'#dc2626',hair:'#111',acc:'⚡',price:9}
];

const SIGHTS_PER_SESSION = 12;
let a1State = {};

function charSVG(outfit, size) {
  const o = outfit || a1Outfits[0];
  const s = size || 60;
  const scale = s / 60;
  return '<svg width="'+s+'" height="'+(s*1.65)+'" viewBox="0 0 60 99" xmlns="http://www.w3.org/2000/svg">' +
    '<circle cx="30" cy="16" r="13" fill="#fcd5b4" stroke="#d4a574" stroke-width="0.8"/>' +
    '<path d="M17 12 Q17 3 30 3 Q43 3 43 12 Z" fill="'+o.hair+'"/>' +
    '<circle cx="24" cy="14" r="2" fill="#333"/><circle cx="36" cy="14" r="2" fill="#333"/>' +
    '<path d="M25 20 Q30 25 35 20" fill="none" stroke="#333" stroke-width="1.2" stroke-linecap="round"/>' +
    '<rect x="19" y="30" width="22" height="26" rx="4" fill="'+o.shirt+'"/>' +
    '<rect x="11" y="32" width="8" height="20" rx="4" fill="'+o.shirt+'"/>' +
    '<rect x="41" y="32" width="8" height="20" rx="4" fill="'+o.shirt+'"/>' +
    '<circle cx="15" cy="54" r="3.5" fill="#fcd5b4"/><circle cx="45" cy="54" r="3.5" fill="#fcd5b4"/>' +
    '<rect x="19" y="55" width="9" height="22" rx="3" fill="'+o.pants+'" class="char-leg-l" style="transform-origin:23px 55px"/>' +
    '<rect x="32" y="55" width="9" height="22" rx="3" fill="'+o.pants+'" class="char-leg-r" style="transform-origin:36px 55px"/>' +
    '<rect x="17" y="75" width="13" height="5" rx="2.5" fill="'+o.shoes+'"/>' +
    '<rect x="30" y="75" width="13" height="5" rx="2.5" fill="'+o.shoes+'"/>' +
    (o.acc ? '<text x="30" y="-2" text-anchor="middle" font-size="14">'+o.acc+'</text>' : '') +
    '</svg>';
}

function saveA1(){ try{localStorage.setItem('a1save',JSON.stringify({coins:a1State.coins,owned:a1State.owned,equipped:a1State.equipped}));}catch(e){} }
function loadA1(){ try{const d=JSON.parse(localStorage.getItem('a1save'));if(d){return d;}}catch(e){} return null; }

function initQuizA1(){
  const save = loadA1();
  const shuffledSights = [...a1Sights].sort(()=>Math.random()-0.5).slice(0, SIGHTS_PER_SESSION);
  // Shuffle questions within each sight too
  shuffledSights.forEach(s => { s.q = [...s.q].sort(()=>Math.random()-0.5); });
  a1State = {
    coins: save ? save.coins : 0,
    owned: save ? save.owned : [0],
    equipped: save ? save.equipped : 0,
    sights: shuffledSights,
    sightIdx: 0,
    qIdx: 0,
    started: false,
    phase: 'start', // start | walking | quiz | sightDone | gameEnd
    walkTimer: null,
    walkSec: 0
  };
  renderA1Start();
}

function renderA1Start(){
  a1State.phase = 'start';
  const outfit = a1Outfits[a1State.equipped];
  document.getElementById('a1-scene').innerHTML =
    '<div style="min-height:100vh;background:linear-gradient(180deg,#87ceeb 0%,#b6f0a0 60%,#6ec94a 100%);display:flex;align-items:center;justify-content:center;padding:20px;">' +
    '<div class="start-card">' +
    '<h2>'+t('a1StartH')+'</h2>' +
    '<div class="char-display">'+charSVG(outfit,80)+'</div>' +
    '<p>'+t('a1StartP1')+'</p>' +
    '<p>'+t('a1StartP2')+'</p>' +
    '<p>'+t('a1StartP3')+'</p>' +
    '<p>'+t('a1StartP4')+'</p>' +
    '<p style="color:#6b7280;font-size:0.88rem;margin-top:8px;">'+t('a1SightCount',{n:a1State.sights.length})+'</p>' +
    '<button class="start-btn" onclick="startA1Walking()">'+t('a1StartBtn')+'</button>' +
    '</div></div>';
}

function buildCityscape(){
  let blds = '';
  const colors = ['#374151','#4b5563','#6b7280','#1e3a8a','#1e40af','#7c2d12','#991b1b','#312e81'];
  for(let i=0;i<60;i++){
    const h = 60 + Math.random()*140;
    const w = 20 + Math.random()*30;
    const c = colors[Math.floor(Math.random()*colors.length)];
    let wins = '';
    for(let r=10;r<h-10;r+=16){
      for(let cl=4;cl<w-8;cl+=10){
        if(Math.random()>0.3) wins += '<div class="win" style="left:'+cl+'px;bottom:'+r+'px;"></div>';
      }
    }
    blds += '<div class="bld" style="width:'+w+'px;height:'+h+'px;background:'+c+';">'+wins+'</div>';
  }
  return blds;
}

function renderWalkScene(){
  const outfit = a1Outfits[a1State.equipped];
  const s = a1State.sights[a1State.sightIdx];
  const cityscape = buildCityscape();
  document.getElementById('a1-scene').innerHTML =
    '<div class="walk-scene">' +
    '<div class="sky-layer"></div>' +
    '<div class="sun">☀️</div>' +
    '<div class="cloud-layer" id="a1-clouds"></div>' +
    '<div class="buildings-layer" style="--walk-dur:'+a1State.walkSec+'s;--walk-play:running;"><div class="bld-strip">'+cityscape+cityscape+cityscape+'</div></div>' +
    '<div class="road-layer"><div class="sidewalk"></div><div class="road-line" style="--walk-dur:'+a1State.walkSec+'s;--walk-play:running;"></div></div>' +
    '<div class="char-wrap walking" id="a1-char">'+charSVG(outfit,55)+'</div>' +
    '<div class="walk-hud">' +
    '<div class="hud-coins">🪙 '+a1State.coins+' <button class="shop-btn" onclick="openA1Shop()">'+t('a1ShopBtn')+'</button></div>' +
    '<div class="hud-info">'+t('a1SightN',{a:a1State.sightIdx+1,b:a1State.sights.length})+'</div>' +
    '</div>' +
    '<div class="walk-dest">'+s.icon+' '+t('a1WalkingTo',{name:s.name})+'</div>' +
    '<div class="walk-timer"><div class="timer-bar"><div class="timer-fill" id="a1-timer-fill" style="width:100%"></div></div><div class="timer-text" id="a1-timer-text">'+a1State.walkSec+'s</div></div>' +
    '</div>';
  // Add clouds
  const cb = document.getElementById('a1-clouds');
  for(let i=0;i<5;i++){
    const c=document.createElement('div'); c.className='cloud-float'; c.textContent='☁️';
    c.style.top=(5+Math.random()*80)+'%';
    c.style.animationDuration=(20+Math.random()*20)+'s';
    c.style.animationDelay=(-Math.random()*28)+'s';
    cb.appendChild(c);
  }
  // Spawn occasional cars
  a1State._carInt = setInterval(()=>{
    if(Math.random()<0.4){
      const cars=['🚗','🚕','🚙','🚌','🏎️'];
      const el=document.createElement('div');el.className='car-anim';
      el.textContent=cars[Math.floor(Math.random()*cars.length)];
      el.style.bottom=(2+Math.random()*12)+'%';
      const scene=document.querySelector('#quiz-a1 .walk-scene');
      if(scene){scene.appendChild(el);setTimeout(()=>el.remove(),4500);}
    }
  },2000);
  // Timer countdown
  let sec = a1State.walkSec;
  a1State.walkTimer = setInterval(()=>{
    sec--;
    const pct = (sec/a1State.walkSec)*100;
    const fill=document.getElementById('a1-timer-fill');
    const txt=document.getElementById('a1-timer-text');
    if(fill) fill.style.width=pct+'%';
    if(txt) txt.textContent=sec+'s';
    if(sec<=0){
      clearInterval(a1State.walkTimer);
      if(a1State._carInt) clearInterval(a1State._carInt);
      a1State.phase='quiz';
      a1State.qIdx=0;
      renderA1Quiz();
    }
  },1000);
}

function startA1Walking(){
  a1State.started=true;
  a1State.phase='walking';
  a1State.walkSec = a1State.sightIdx===0 ? 5 : 10;
  renderWalkScene();
}

function shuffleOpts(q){
  const indices = q.o.map((_,i)=>i).sort(()=>Math.random()-0.5);
  return { opts:indices.map(i=>q.o[i]), correctIdx:indices.indexOf(q.a) };
}

function renderA1Quiz(){
  const s = a1State.sights[a1State.sightIdx];
  if(a1State.qIdx >= s.q.length){ renderA1SightDone(); return; }
  const q = s.q[a1State.qIdx];
  const sh = shuffleOpts(q);
  a1State._correctIdx = sh.correctIdx;
  const outfit = a1Outfits[a1State.equipped];
  const optsHtml = sh.opts.map((o,i)=>
    '<button class="opt-btn" data-idx="'+i+'" onclick="answerA1('+i+')">'+String.fromCharCode(65+i)+') '+o+'</button>'
  ).join('');
  document.getElementById('a1-scene').innerHTML =
    '<div class="walk-scene">' +
    '<div class="sky-layer" style="filter:blur(3px);opacity:0.6;"></div>' +
    '<div class="sight-card"><div class="sight-inner">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">' +
    '<div class="sight-header"><div class="sight-icon">'+s.icon+'</div><div class="sight-name">'+s.name+'</div></div>' +
    '<div class="hud-coins" style="font-size:0.9rem;">🪙 '+a1State.coins+' <button class="shop-btn" style="font-size:0.8rem;padding:5px 10px;" onclick="openA1Shop()">'+t('a1ShopBtn')+'</button></div>' +
    '</div>' +
    '<div class="q-count">'+t('a1QOf',{a:a1State.qIdx+1,b:s.q.length})+'</div>' +
    '<div class="question-text">'+q.q+'</div>' +
    '<div class="options" id="a1-opts">'+optsHtml+'</div>' +
    '<div class="feedback-box" id="a1-fb"></div>' +
    '<div style="text-align:center;"><button class="nav-btn" id="a1-next" style="display:none;" onclick="nextA1()">'+t('a1Next')+'</button></div>' +
    '</div></div></div>';
}

function answerA1(idx){
  const s = a1State.sights[a1State.sightIdx];
  const q = s.q[a1State.qIdx];
  const correctIdx = a1State._correctIdx;
  document.querySelectorAll('#a1-opts .opt-btn').forEach(b=>b.disabled=true);
  const fb = document.getElementById('a1-fb');
  if(idx === correctIdx){
    a1State.coins++;
    document.querySelector('#a1-opts .opt-btn[data-idx="'+idx+'"]').classList.add('correct');
    fb.className='feedback-box show correct'; fb.innerHTML=t('a1Correct');
  } else {
    document.querySelector('#a1-opts .opt-btn[data-idx="'+idx+'"]').classList.add('wrong');
    document.querySelector('#a1-opts .opt-btn[data-idx="'+correctIdx+'"]').classList.add('correct');
    a1State.coins=Math.max(0,a1State.coins-1);
    fb.className='feedback-box show wrong';
    fb.innerHTML=t('a1Wrong',{ans:q.o[q.a]})+'<br><small>'+t('a1Tip',{t:q.t})+'</small>';
    setTimeout(()=>showLoser(),400);
  }
  saveA1();
  document.getElementById('a1-next').style.display='inline-block';
}

function showLoser(){
  const faces=['😂','😜','🤪','😝','😹'];
  document.querySelector('#a1-loser .loser-face').textContent=faces[Math.floor(Math.random()*faces.length)];
  document.querySelector('#a1-loser .loser-text').textContent=t('loserText');
  document.getElementById('a1-loser').classList.add('show');
}
function closeLoser(){ document.getElementById('a1-loser').classList.remove('show'); }

function nextA1(){
  a1State.qIdx++;
  renderA1Quiz();
}

function renderA1SightDone(){
  const s = a1State.sights[a1State.sightIdx];
  const isLast = a1State.sightIdx >= a1State.sights.length - 1;
  const nextSight = isLast ? null : a1State.sights[a1State.sightIdx+1];
  document.getElementById('a1-scene').innerHTML =
    '<div class="walk-scene"><div class="sky-layer"></div>' +
    '<div class="done-overlay"><div class="done-card">' +
    '<div style="font-size:3rem;">🎉</div>' +
    '<h2 style="color:#1e3a8a;margin:10px 0;">'+t('a1BldComplete')+'</h2>' +
    '<p style="color:#374151;">'+s.icon+' '+s.name+'</p>' +
    '<p style="color:#6b7280;margin:10px 0;">🪙 '+a1State.coins+' '+t('a1CoinBar',{n:a1State.coins})+'</p>' +
    (nextSight ? '<p style="color:#374151;">'+t('a1NextStop',{b:nextSight.icon+' '+nextSight.name})+'</p>' : '') +
    '<button class="nav-btn" style="margin-top:14px;" onclick="'+(isLast?'renderA1End()':'advanceA1Sight()')+'">'+
    (isLast?t('a1Finish'):t('a1KeepWalking'))+'</button>' +
    '</div></div></div>';
}

function advanceA1Sight(){
  a1State.sightIdx++;
  a1State.qIdx=0;
  a1State.phase='walking';
  a1State.walkSec=10;
  renderWalkScene();
}

function renderA1End(){
  document.getElementById('a1-scene').innerHTML =
    '<div class="end-wrap"><div class="end-card" style="max-width:500px;width:90%;border:3px solid #fbbf24;">' +
    '<div style="font-size:3.5rem;">🏆🗺️</div>' +
    '<h3>'+t('a1EndTitle')+'</h3>' +
    '<p>'+t('a1EndScore',{n:a1State.coins,s:a1State.sights.length})+'</p>' +
    '<p style="margin-top:8px;">'+charSVG(a1Outfits[a1State.equipped],70)+'</p>' +
    '<p style="color:#6b7280;margin-top:8px;">'+t('a1EndMsg')+'</p>' +
    '<button class="restart-btn" style="margin-top:14px;" onclick="initQuizA1()">'+t('a1Replay')+'</button>' +
    '</div></div>';
  launchCf('a1-scene','cf-piece');
}

function openA1Shop(){
  const grid=document.getElementById('a1-shop-grid');
  grid.innerHTML=a1Outfits.map((item,i)=>{
    const owned=a1State.owned.includes(i);
    const eq=a1State.equipped===i;
    return '<div class="shop-item'+(owned?' owned':'')+(eq?' equipped':'')+'" onclick="buyA1Item('+i+')">' +
      '<div class="si-preview">'+charSVG(item,50)+'</div>' +
      '<div class="si-name">'+(item.acc?item.acc+' ':'')+item.name+'</div>' +
      '<div class="si-price">'+(eq?'✅ Wearing':owned?t('a1ShopOwned'):t('a1ShopCoin',{n:item.price}))+'</div>' +
      '</div>';
  }).join('');
  document.getElementById('a1-shop').classList.add('show');
}

function buyA1Item(idx){
  if(a1State.owned.includes(idx)){
    a1State.equipped=idx;
    saveA1();
    alert(t('a1ShopEquip',{name:a1Outfits[idx].name})); openA1Shop(); return;
  }
  const item=a1Outfits[idx];
  if(item.price===0){ a1State.owned.push(idx); a1State.equipped=idx; saveA1(); openA1Shop(); return; }
  if(a1State.coins<item.price){ alert(t('a1ShopNoCoin',{n:item.price})); return; }
  a1State.coins-=item.price; a1State.owned.push(idx); a1State.equipped=idx;
  saveA1();
  alert(t('a1ShopBuy',{name:item.name})); openA1Shop();
}

function renderA1QuizIfActive() {
  if(typeof a1State !== 'undefined' && a1State.started) {
    if(a1State.phase==='quiz') renderA1Quiz();
    else if(a1State.phase==='start') renderA1Start();
  }
}

  {type:'tf',q:'London hosted the Olympic Games only once, in 1948.',ans:false,img:'🏅',tip:'London hosted the Olympics in 1908, 1948 and 2012 – three times!'},

  {type:'tf',q:'The Crown Jewels are kept at the Tower of London.',ans:true,img:'💎',tip:'They have been there for centuries.'},
  {type:'mc',q:'Which of these is the name of London\'s main international airport?',img:'✈️',
    opts:['Heathrow Airport','Thames Airport','Royal London Airport','Victoria Airport'],ans:0,
    tip:'It is one of the busiest airports in the world.'}
];
const a2Animals=['🐶','🐱','🐰','🐼','🐨','🦊','🐸','🐮','🦁','🐯'];
let a2State={};

function initQuizA2(){ a2State={idx:0,score:0}; renderA2(); }

function renderA2(){
  const wrap=document.getElementById('a2-wrap');
  if(a2State.idx>=a2Questions.length){ renderA2End(); return; }
  const q=a2Questions[a2State.idx];
  const pct=(a2State.idx/a2Questions.length*100).toFixed(0);
  let answersHtml;
  if(q.type==='tf'){
    answersHtml=`<div class="tf-btns">
      <button class="tf-btn t-btn" onclick="answerA2(true)">${t('a2True')}</button>
      <button class="tf-btn f-btn" onclick="answerA2(false)">${t('a2False')}</button>
    </div>`;
  } else {
    answersHtml=`<div class="mc-opts">${q.opts.map((o,i)=>`<button class="mc-opt" data-idx="${i}" onclick="answerA2(${i})">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}</div>`;
  }
  wrap.innerHTML=`
    <div class="game-title">${t('a2Title')}</div>
    <div class="score-disp">${t('a2Score',{a:a2State.idx+1,b:a2Questions.length,s:a2State.score})}</div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%"></div></div>
    <div class="question-card">
      <div class="q-img-col"><div class="q-img-emoji">${q.img}</div></div>
      <div class="q-body">
        <div class="q-num">Q${a2State.idx+1}</div>
        <div class="q-text">${q.q}</div>
        ${answersHtml}
        <div class="tip-box" id="a2-tip">${t('a2Tip',{t:q.tip})}</div>
        <button class="next-btn" id="a2-next" onclick="nextA2()">${t('a2Next')}</button>
      </div>
    </div>`;
}

function answerA2(choice){
  const q=a2Questions[a2State.idx];
  const correct=(q.type==='tf')?choice===q.ans:choice===q.ans;
  if(q.type==='tf'){
    document.querySelectorAll('#a2-wrap .tf-btn').forEach(b=>{
      b.disabled=true;
      if((b.classList.contains('t-btn')&&q.ans===true)||(b.classList.contains('f-btn')&&q.ans===false)) b.classList.add('correct');
      if((b.classList.contains('t-btn')&&choice===true&&!correct)||(b.classList.contains('f-btn')&&choice===false&&!correct)) b.classList.add('wrong');
    });
  } else {
    document.querySelectorAll('#a2-wrap .mc-opt').forEach(b=>{
      b.disabled=true;
      if(parseInt(b.dataset.idx)===q.ans) b.classList.add('correct');
      if(parseInt(b.dataset.idx)===choice&&!correct) b.classList.add('wrong');
    });
  }
  if(correct){ a2State.score++; launchCf('quiz-a2','cf-piece'); }
  else { spawnA2Animal(); document.getElementById('a2-tip').classList.add('show'); }
  document.getElementById('a2-next').classList.add('show');
}

function spawnA2Animal(){
  const animal=a2Animals[Math.floor(Math.random()*a2Animals.length)];
  const el=document.createElement('div'); el.className='animal-pop';
  el.textContent=animal+'😢';
  el.style.left=(10+Math.random()*60)+'vw'; el.style.top=(30+Math.random()*30)+'vh';
  document.getElementById('quiz-a2').appendChild(el);
  setTimeout(()=>el.remove(),1900);
}
function nextA2(){ a2State.idx++; renderA2(); }

function renderA2End(){
  document.getElementById('a2-wrap').innerHTML=`
    <div class="game-title">${t('a2Title')}</div>
    <div class="end-card">
      <div style="font-size:3rem;">🏆</div>
      <h3>${t('a2EndTitle')}</h3>
      <p>${t('a2EndScore',{s:a2State.score,t:a2Questions.length})}</p>
      <p>${a2State.score>=12?t('a2EndGreat'):a2State.score>=8?t('a2EndGood'):t('a2EndOk')}</p>
      <button class="restart-btn" onclick="initQuizA2()">${t('a2Replay')}</button>
    </div>`;
  launchCf('quiz-a2','cf-piece');
}

    try{

      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value=110; osc.type='sawtooth';
      gain.gain.setValueAtTime(0.3,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.4);

        <button class="tf-a5 f-btn" id="a5-false" onclick="a5Select(false)">${t('a5False')}</button>
      </div>
      <p style="color:#6b7280;font-size:0.88rem;margin-bottom:6px;">${t('a5ExplLabel')}</p>
      <textarea class="expl-area" id="a5-expl" placeholder="${t('a5ExplPlaceholder')}"></textarea>
      <div style="text-align:center;">
        <button class="submit-a5" id="a5-submit" onclick="submitA5()">${t('a5Submit')}</button>
      </div>
      <div class="fb-a5" id="a5-fb"></div>
      <div style="text-align:center;">
        <button class="nav-a5" id="a5-nav" onclick="nextA5()">${t('a5Next')}</button>
      </div>
    </div>`;
  a5State.selected=null;
}

function a5Select(val){
  a5State.selected=val;
  document.getElementById('a5-true').classList.toggle('sel',val===true);
  document.getElementById('a5-false').classList.toggle('sel',val===false);
}

function submitA5(){
  const expl=document.getElementById('a5-expl').value.trim();
  if(a5State.selected===null||expl.length<3){ alert(t('a5NeedBoth')); return; }
  const q=a5Questions[a5State.idx];
  const correct=a5State.selected===q.ans;
  document.getElementById('a5-true').disabled=true;
  document.getElementById('a5-false').disabled=true;
  document.getElementById('a5-submit').disabled=true;
  document.getElementById('a5-expl').disabled=true;
  if(q.ans===true) document.getElementById('a5-true').classList.add('correct');
  else document.getElementById('a5-false').classList.add('correct');
  if(!correct){
    if(a5State.selected===true) document.getElementById('a5-true').classList.add('wrong');
    else document.getElementById('a5-false').classList.add('wrong');
  }
  const fb=document.getElementById('a5-fb');
  if(correct){ a5State.score++; fb.className='fb-a5 show correct'; fb.textContent=t('a5Correct'); }
  else { a5State.score=Math.max(0,a5State.score-1); fb.className='fb-a5 show wrong'; fb.textContent=t('a5Wrong',{ans:q.ans?'True':'False'}); }
  document.getElementById('a5-nav').classList.add('show');
}

function nextA5(){ a5State.idx++; renderA5(); }

function renderA5End(){
  document.getElementById('a5-wrap').innerHTML=`
    <div style="text-align:center;">
      <div class="game-title">${t('a5GameTitle')}</div>
    </div>
    <div class="end-card" style="margin-top:30px;">
      <div style="font-size:3rem;">🥅🇬🇧</div>
      <h3>${t('a5EndTitle')}</h3>
      <p>${t('a5EndScore',{s:a5State.score,t:a5Questions.length})}</p>
      <p>${a5State.score>=6?t('a5EndGreat'):a5State.score>=4?t('a5EndGood'):t('a5EndOk')}</p>
      <button class="restart-btn" onclick="initQuizA5()">${t('a5Replay')}</button>
    </div>`;
  launchCf('quiz-a5','cf-piece');
}

/* =====================================================================
   QUIZ C1 — Scotland Topics (16 questions, half-point retries, star rating)
   ===================================================================== */
const c1AllQuestions=[
  // Multiple-Choice (8) — bg images are neutral, do NOT hint at answer
  {type:'mc',q:'How many islands does Scotland have?',opts:['215','920','800'],ans:2,
   bg:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=70'},
  {type:'mc',q:'What are the four main groups of the Scottish Isles?',opts:['Shetland Islands, Outer Hebrides, Inner Hebrides, Orkney Islands','Ben Wyvis, Orkney Islands, Oslo, Edinburgh','Shetland Island, Outer Hebrides, Inner Hebrides, Edinburgh'],ans:0,
   bg:'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=900&q=70'},
  {type:'mc',q:'What is the highest mountain in Scotland?',opts:['Ben Nevis','Ben Wyvis','Ben Macdui'],ans:0,
   bg:'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=900&q=70'},
  {type:'mc',q:'How many of Scotland\'s islands are inhabited?',opts:['About 800','About 100','About 500'],ans:1,
   bg:'https://images.unsplash.com/photo-1518173946687-a250ed5b0d50?w=900&q=70'},
  {type:'mc',q:'Why do Selkies leave the sea according to mythology?',opts:['They are looking for love','They are looking for a party','They are looking for their babies'],ans:0,
   bg:'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=900&q=70'},
  {type:'mc',q:'What are Kelpies in Scottish folklore?',opts:['Water horses','Water people','Water spirits'],ans:0,
   bg:'https://images.unsplash.com/photo-1509316785289-025f5b846b35?w=900&q=70'},
  {type:'mc',q:'Which traditional music instrument is widely associated with Scotland?',opts:['Bagpipes','Pop Music','Harp'],ans:0,
   bg:'https://images.unsplash.com/photo-1505765050516-f72dcac9c60e?w=900&q=70'},
  {type:'mc',q:'What is the national animal of Scotland?',opts:['Unicorn','Red deer','Highland cow'],ans:0,
   bg:'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=900&q=70'},
  // Yes/No (8)
  {type:'yn',q:'Is the population density of Scotland one of the least dense in Europe?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1533577116850-9cc66cad8a9b?w=900&q=70'},
  {type:'yn',q:'Is the Puffin a native bird commonly found on Scottish islands?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1444464666168-49d633b86797?w=900&q=70'},
  {type:'yn',q:'Does Scotland have more than 30,000 freshwater lochs?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1476514525535-07fb3b4ae5f1?w=900&q=70'},
  {type:'yn',q:'Is Loch Ness the largest freshwater lake in Scotland by volume?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1500534314263-a5c3a7b0e07a?w=900&q=70'},
  {type:'yn',q:'Are the Northern Lights sometimes visible from Scotland?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1483347756197-71ef80e95f73?w=900&q=70'},
  {type:'yn',q:'Is the Scottish Highlands home to wild red deer?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=900&q=70'},
  {type:'yn',q:'Is Edinburgh the capital city of Scotland?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1477346611705-65d1883cee1e?w=900&q=70'},
  {type:'yn',q:'Does Scotland have its own national football team?',ans:0,opts:['Yes','No'],
   bg:'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=900&q=70'}
];
// Fallback gradient if image fails to load
const c1FallbackBg = 'linear-gradient(135deg,#065f46 0%,#1e3a8a 50%,#312e81 100%)';
let c1State={};

function initQuizC1(){
  const shuffled=[...c1AllQuestions].sort(()=>Math.random()-0.5);
  c1State={queue:[...shuffled],retry:[],idx:0,score:0,total:c1AllQuestions.length,phase:'main',hadWrong:false};
  renderC1();
}

function renderC1(){
  const wrap=document.getElementById('c1-wrap');
  const bg=document.getElementById('c1-bg');
  if(c1State.idx>=c1State.queue.length){
    if(c1State.retry.length>0){
      c1State.queue=c1State.retry.sort(()=>Math.random()-0.5);
      c1State.retry=[];
      c1State.idx=0;
      c1State.phase='retry';
    } else {
      renderC1End(); return;
    }
  }
  const q=c1State.queue[c1State.idx];
  // Set real photo background
  if(q.bg){
    bg.style.backgroundImage='url('+q.bg+')';
    bg.style.background='url('+q.bg+') center/cover no-repeat';
    bg.onerror=()=>{bg.style.background=c1FallbackBg;};
  } else {
    bg.style.background=c1FallbackBg;
  }
  // Shuffle options
  const indices=[...q.opts.keys()].sort(()=>Math.random()-0.5);
  const retryLabel=c1State.phase==='retry'?' <span style="color:#d97706;font-size:0.85rem;">(½ pt)</span>':'';
  wrap.innerHTML=
    '<div style="text-align:center;">' +
    '<div class="game-title-c1">'+t('c1GameTitle')+'</div>' +
    '<div class="score-c1">'+t('c1Score',{s:c1State.score})+retryLabel+'</div>' +
    '</div>' +
    '<div class="q-card-c1">' +
    '<div class="q-text-c1">'+q.q+'</div>' +
    '<div class="opts-c1" id="c1-opts">' +
    indices.map(i=>'<button class="opt-c1" data-idx="'+i+'" onclick="answerC1('+i+')">'+q.opts[i]+'</button>').join('') +
    '</div>' +
    '<div class="fb-c1" id="c1-fb"></div>' +
    '<div style="text-align:center;"><button class="nav-c1" id="c1-nav" onclick="nextC1()">'+t('c1Next')+'</button></div>' +
    '</div>';
}

function answerC1(idx){
  const q=c1State.queue[c1State.idx];
  const correct=idx===q.ans;
  document.querySelectorAll('#c1-opts .opt-c1').forEach(b=>b.disabled=true);
  document.querySelector('#c1-opts .opt-c1[data-idx="'+q.ans+'"]').classList.add('correct');
  if(!correct) document.querySelector('#c1-opts .opt-c1[data-idx="'+idx+'"]').classList.add('wrong');
  const fb=document.getElementById('c1-fb');
  if(correct){
    if(c1State.phase==='retry'){
      c1State.score+=0.5; // Half point on retry
    } else {
      c1State.score+=1;
    }
    fb.className='fb-c1 show correct';
    fb.textContent=t('c1Correct');
  } else {
    c1State.hadWrong=true;
    fb.className='fb-c1 show wrong';
    fb.innerHTML=t('c1Wrong')+'<br><small>'+t('c1RetryNote')+'</small>';
    c1State.retry.push(q);
  }
  document.getElementById('c1-nav').classList.add('show');
}

function nextC1(){ c1State.idx++; renderC1(); }

function renderC1End(){
  const s=c1State.score;
  // Star rating: 5 stars ONLY if perfect (no wrong answers)
  let stars;
  if(!c1State.hadWrong && s>=16) stars=5;
  else if(s>=14) stars=4;
  else if(s>=11) stars=3;
  else if(s>=8) stars=2;
  else stars=1;
  // Can't get 5 stars if any wrong answer
  if(c1State.hadWrong && stars>=5) stars=4;
  const starStr='⭐'.repeat(stars)+'☆'.repeat(5-stars);
  // Clear bg
  document.getElementById('c1-bg').style.background='linear-gradient(135deg,#065f46 0%,#1e3a8a 100%)';
  document.getElementById('c1-bg').style.opacity='0.5';
  document.getElementById('c1-wrap').innerHTML=
    '<div style="text-align:center;"><div class="game-title-c1">'+t('c1GameTitle')+'</div></div>' +
    '<div class="end-card" style="margin-top:30px;">' +
    '<div style="font-size:3rem;">🏴󠁧󠁢󠁳󠁣󠁴󠁿</div>' +
    '<h3>'+t('c1EndTitle')+'</h3>' +
    '<p style="font-size:1.2rem;font-weight:700;">'+s+' / 16 '+t('c1Pts')+'</p>' +
    '<div class="stars-row">'+starStr+'</div>' +
    '<p>'+t('c1Stars',{n:stars})+'</p>' +
    (c1State.hadWrong?'<p style="color:#92400e;font-size:0.88rem;margin-top:6px;">'+t('c1NoFive')+'</p>':'') +
    '<button class="restart-btn" onclick="initQuizC1()">'+t('c1Replay')+'</button>' +
    '</div>';
  launchCf('quiz-c1','cf-piece');
}


/* =====================================================================
   QUIZ D1 — Manchester Quiz App (stadium, hints cost points)
   ===================================================================== */
const d1Questions=[
  {q:'What is the name of Manchester\'s most famous football stadium?',opts:['Old Trafford','Etihad Stadium','Anfield','Wembley'],ans:0,hint:'It is called the "Theatre of Dreams".',fact:'Old Trafford can hold over 74,000 fans and was built in 1910.'},
  {q:'Which Manchester club plays at the Etihad Stadium?',opts:['Manchester City','Manchester United','Bolton Wanderers','Stockport County'],ans:0,hint:'Their nickname is "The Citizens".',fact:'The Etihad Stadium was originally built for the 2002 Commonwealth Games.'},
  {q:'What is Manchester\'s official symbol?',opts:['A worker bee','A red rose','A lion','A football'],ans:0,hint:'It represents the city\'s hard-working spirit.',fact:'The worker bee became a symbol of Manchester during the Industrial Revolution.'},
  {q:'Which famous music band came from Manchester?',opts:['Oasis','The Beatles','Coldplay','The Rolling Stones'],ans:0,hint:'The Gallagher brothers were in this band.',fact:'Oasis formed in Manchester in 1991 and became one of the biggest bands of the 1990s.'},
  {q:'What is the name of the tram system in Manchester?',opts:['Metrolink','Manchester Line','CityRail','TransManc'],ans:0,hint:'It is the largest light rail network in the UK.',fact:'Metrolink opened in 1992 and now has over 99 stops across Greater Manchester.'},
  {q:'Which river flows through Manchester?',opts:['River Irwell','River Thames','River Mersey','River Trent'],ans:0,hint:'It forms the boundary between Manchester and Salford.',fact:'The River Irwell was once one of the most polluted rivers in England, but has been cleaned up significantly.'}
];
let d1State={};

function initQuizD1(){ d1State={idx:0,score:0,hintUsed:false}; renderD1(); }

function renderD1(){
  const wrap=document.getElementById('d1-wrap');
  if(d1State.idx>=d1Questions.length){ renderD1End(); return; }
  const q=d1Questions[d1State.idx];
  const hintBtnHtml=d1State.hintUsed?'':`<button class="hint-btn-d1" id="d1-hint-btn" onclick="showD1Hint()">${t('d1HintBtn')}</button>`;
  wrap.innerHTML=`
    <div style="text-align:center;">
      <div class="game-title-d1">${t('d1GameTitle')}</div>
      <div class="score-d1">${t('d1Score',{s:d1State.score,a:d1State.idx+1,b:d1Questions.length})}</div>
    </div>
    <div class="q-card-d1">
      <div class="q-text-d1">${q.q}</div>
      ${hintBtnHtml}
      <div class="hint-text-d1" id="d1-hint">${q.hint}</div>
      <div class="opts-d1" id="d1-opts">
        ${q.opts.map((o,i)=>`<button class="opt-d1" data-idx="${i}" onclick="answerD1(${i})">${String.fromCharCode(65+i)}) ${o}</button>`).join('')}
      </div>
      <div class="fb-d1" id="d1-fb"></div>
      <div class="fun-fact-d1" id="d1-fact">${t('d1FunFact',{f:q.fact})}</div>
      <div style="text-align:center;">
        <button class="nav-d1" id="d1-nav" onclick="nextD1()">${t('d1Next')}</button>
      </div>
    </div>`;
  d1State.hintUsed=false;
}

function showD1Hint(){
  if(d1State.hintUsed) return;
  d1State.hintUsed=true;
  d1State.score=Math.max(0,d1State.score-1);
  document.getElementById('d1-hint').classList.add('show');
  const btn=document.getElementById('d1-hint-btn'); if(btn) btn.textContent=t('d1HintUsed');
  // update score display
  const scoreEl=document.querySelector('#quiz-d1 .score-d1');
  if(scoreEl) scoreEl.textContent=t('d1Score',{s:d1State.score,a:d1State.idx+1,b:d1Questions.length});
}

function answerD1(idx){
  const q=d1Questions[d1State.idx];
  const correct=idx===q.ans;
  document.querySelectorAll('#d1-opts .opt-d1').forEach(b=>b.disabled=true);
  document.querySelector(`#d1-opts .opt-d1[data-idx="${q.ans}"]`).classList.add('correct');
  if(!correct) document.querySelector(`#d1-opts .opt-d1[data-idx="${idx}"]`).classList.add('wrong');
  const fb=document.getElementById('d1-fb');
  if(correct){
    d1State.score++;
    fb.className='fb-d1 show correct'; fb.textContent=t('d1Correct');
  } else {
    fb.className='fb-d1 show wrong'; fb.textContent=t('d1Wrong',{ans:q.opts[q.ans]});
  }
  document.getElementById('d1-fact').classList.add('show');
  document.getElementById('d1-nav').classList.add('show');
  const hintBtn=document.getElementById('d1-hint-btn'); if(hintBtn) hintBtn.style.display='none';
}

function nextD1(){ d1State.idx++; d1State.hintUsed=false; renderD1(); }

function renderD1End(){
  const max=d1Questions.length;
  document.getElementById('d1-wrap').innerHTML=`
    <div style="text-align:center;">
      <div class="game-title-d1">${t('d1GameTitle')}</div>
    </div>
    <div class="end-card" style="margin-top:30px;">
      <div style="font-size:3rem;">⚽🏆</div>
      <h3>${t('d1EndTitle')}</h3>
      <p>${t('d1EndScore',{s:d1State.score,t:max})}</p>
      <p>${d1State.score>=5?t('d1EndGreat'):d1State.score>=3?t('d1EndGood'):t('d1EndOk')}</p>
      <button class="restart-btn" onclick="initQuizD1()">${t('d1Replay')}</button>
    </div>`;
  launchCf('quiz-d1','cf-piece');
}

/* =====================================================================
   SHARED HELPERS
   ===================================================================== */
function launchCf(parentId,cls,colors){
  const cols=colors||['#b91c1c','#d97706','#1e40af','#16a34a','#9333ea'];
  for(let i=0;i<36;i++){
    setTimeout(()=>{
      const f=document.createElement('div'); f.className=cls;
      f.style.background=cols[Math.floor(Math.random()*cols.length)];
      f.style.left=(Math.random()*90)+'vw';
      f.style.animationDuration=(1.2+Math.random()*0.9)+'s';
      const parent=document.getElementById(parentId);
      if(parent){ parent.appendChild(f); setTimeout(()=>f.remove(),2500); }
    },i*65);
  }
}

/* Initial state */
document.getElementById('back-btn').style.display='none';
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Mission Quiz · Sommerbad Pankow</title>
<style>
  /* ── Design tokens ─────────────────────────────────────────── */
  :root {
    --leaf:   #2f7d4f;
    --sky:    #2a6f9e;
    --sun:    #e8a93a;
    --amber:  #fbe7c6;
    --bark:   #5a3d1e;
    --ink:    #1e1e1e;
    --cream:  #fdf8f0;
    --white:  #ffffff;
    --green-ok:  #d4edda;
    --green-bd:  #2f7d4f;
    --red-no:    #fde8e8;
    --red-bd:    #c0392b;
    --grey:   #f2ede6;
    --shadow: 0 4px 24px rgba(90,61,30,.10);
  }

  /* ── Reset & base ───────────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 16px; scroll-behavior: smooth; }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
    background: var(--cream);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Header ─────────────────────────────────────────────────── */
  header {
    width: 100%;
    background: var(--leaf);
    color: var(--white);
    padding: 18px 24px 14px;
    text-align: center;
  }
  header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1.2rem, 3.5vw, 1.7rem);
    font-weight: 700;
    letter-spacing: .02em;
    line-height: 1.2;
  }
  header p {
    font-size: .78rem;
    opacity: .85;
    margin-top: 3px;
    letter-spacing: .06em;
    text-transform: uppercase;
  }

  /* ── Progress bar ───────────────────────────────────────────── */
  #progress-wrap {
    width: 100%;
    max-width: 680px;
    padding: 18px 20px 0;
  }
  #progress-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 7px;
    font-size: .75rem;
    font-weight: 600;
    color: var(--bark);
    letter-spacing: .04em;
  }
  #progress-bar-bg {
    width: 100%;
    height: 8px;
    background: var(--amber);
    border-radius: 99px;
    overflow: hidden;
  }
  #progress-bar-fill {
    height: 100%;
    background: var(--leaf);
    border-radius: 99px;
    transition: width .45s cubic-bezier(.4,0,.2,1);
    width: 0%;
  }

  /* ── Main card ──────────────────────────────────────────────── */
  #quiz-wrap {
    width: 100%;
    max-width: 680px;
    padding: 18px 20px 32px;
    flex: 1;
  }
  .card {
    background: var(--white);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 28px 28px 22px;
    transition: transform .15s ease;
  }

  /* ── Topic badge + emoji ────────────────────────────────────── */
  .topic-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .topic-badge {
    display: inline-block;
    background: var(--amber);
    color: var(--bark);
    font-family: Georgia, serif;
    font-weight: 700;
    font-size: .68rem;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding: 5px 11px;
    border-radius: 6px;
  }
  .topic-emoji {
    font-size: 2.2rem;
    line-height: 1;
    transition: transform .3s cubic-bezier(.34,1.56,.64,1);
  }
  .topic-emoji.pop {
    transform: scale(1.55) rotate(-6deg);
  }

  /* ── Question ───────────────────────────────────────────────── */
  .question {
    font-family: Georgia, "Times New Roman", serif;
    font-size: clamp(1rem, 2.5vw, 1.2rem);
    font-weight: 400;
    line-height: 1.55;
    color: var(--ink);
    margin-bottom: 22px;
  }

  /* ── Answers ────────────────────────────────────────────────── */
  .answers {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  @media (max-width: 480px) {
    .answers { grid-template-columns: 1fr; }
  }
  .ans-btn {
    background: var(--white);
    border: 2px solid var(--amber);
    border-radius: 11px;
    padding: 13px 14px;
    font-size: .88rem;
    font-weight: 500;
    color: var(--ink);
    cursor: pointer;
    text-align: left;
    line-height: 1.4;
    transition: background .15s, border-color .15s, transform .1s;
  }
  .ans-btn:hover:not(:disabled) {
    background: var(--amber);
    border-color: var(--sun);
    transform: translateY(-2px);
  }
  .ans-btn:disabled { cursor: default; }
  .ans-btn.correct {
    background: var(--green-ok);
    border-color: var(--green-bd);
    color: #1a4a2a;
    font-weight: 700;
  }
  .ans-btn.wrong {
    background: var(--red-no);
    border-color: var(--red-bd);
    color: #7b1d1d;
  }

  /* ── Feedback box ───────────────────────────────────────────── */
  #feedback {
    margin-top: 16px;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: .83rem;
    line-height: 1.55;
    display: none;
  }
  #feedback.show { display: block; }
  #feedback.correct-fb {
    background: var(--green-ok);
    border: 1.5px solid var(--green-bd);
    color: #1a4a2a;
  }
  #feedback.wrong-fb {
    background: var(--red-no);
    border: 1.5px solid var(--red-bd);
    color: #7b1d1d;
  }
  #feedback strong { font-weight: 700; }

  /* ── Next button ────────────────────────────────────────────── */
  #next-btn {
    display: none;
    margin-top: 18px;
    width: 100%;
    background: var(--sky);
    color: var(--white);
    border: none;
    border-radius: 11px;
    padding: 14px;
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: background .15s, transform .1s;
  }
  #next-btn:hover { background: #1f587e; transform: translateY(-1px); }
  #next-btn.show { display: block; }

  /* ── Score screen ───────────────────────────────────────────── */
  #score-screen {
    display: none;
    width: 100%;
    max-width: 680px;
    padding: 18px 20px 40px;
    text-align: center;
  }
  #score-screen.show { display: block; }
  .score-card {
    background: var(--white);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 36px 28px 32px;
  }
  .score-mega {
    font-size: 5rem;
    line-height: 1;
    margin-bottom: 6px;
  }
  .score-number {
    font-family: Georgia, serif;
    font-size: clamp(2.2rem, 7vw, 3.5rem);
    font-weight: 700;
    color: var(--leaf);
    line-height: 1;
    margin: 10px 0 6px;
  }
  .score-label {
    font-size: .85rem;
    color: #666;
    margin-bottom: 18px;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .score-message {
    font-family: Georgia, serif;
    font-size: 1.1rem;
    color: var(--bark);
    line-height: 1.6;
    max-width: 420px;
    margin: 0 auto 26px;
  }
  .score-stars {
    font-size: 2rem;
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  /* ── Stat pills at the end ──────────────────────────────────── */
  .stat-row {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 24px;
  }
  .stat-pill {
    background: var(--amber);
    border-radius: 99px;
    padding: 6px 16px;
    font-size: .8rem;
    font-weight: 700;
    color: var(--bark);
  }

  /* ── Missed list ────────────────────────────────────────────── */
  #missed-wrap {
    text-align: left;
    margin-top: 24px;
    border-top: 2px solid var(--amber);
    padding-top: 18px;
    display: none;
  }
  #missed-wrap h3 {
    font-family: Georgia, serif;
    font-size: 1rem;
    color: var(--bark);
    margin-bottom: 10px;
  }
  .missed-item {
    padding: 8px 0;
    border-bottom: 1px solid var(--grey);
    font-size: .82rem;
    line-height: 1.5;
    color: var(--ink);
  }
  .missed-item em { color: var(--green-bd); font-style: normal; font-weight: 700; }

  /* ── Restart btn ────────────────────────────────────────────── */
  #restart-btn {
    margin-top: 24px;
    background: var(--leaf);
    color: var(--white);
    border: none;
    border-radius: 11px;
    padding: 14px 36px;
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: background .15s;
  }
  #restart-btn:hover { background: #246040; }

  /* ── Shake animation (wrong answer) ────────────────────────── */
  @keyframes shake {
    0%,100%{ transform: translateX(0); }
    20%    { transform: translateX(-7px); }
    40%    { transform: translateX(6px); }
    60%    { transform: translateX(-5px); }
    80%    { transform: translateX(4px); }
  }
  .shake { animation: shake .4s ease; }

  /* ── Confetti dots ──────────────────────────────────────────── */
  .confetti-dot {
    position: fixed;
    width: 10px; height: 10px;
    border-radius: 50%;
    pointer-events: none;
    animation: confettiFall 1s ease-out forwards;
  }
  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
    100% { opacity: 0; transform: translateY(120px) rotate(360deg); }
  }
</style>
</head>
<body>

<header>

</header>

    </div>

  </div>
</div>

  {
    topic: "Friends buffer stress", emoji: "🤗",
    q: "Having a friend nearby during a stressful task lowered which body response?",
    opts: ["Blood pressure", "Blood sugar", "Cortisol response", "Heart size"],
    ans: 2,
    why: "<strong>Cortisol response</strong> — your friend's presence literally calmed your biology. Company is not just emotionally nice; it physically reduces your stress hormones."
  },
  {
    topic: "We're wired for nature", emoji: "🌱",
    q: "What does the scientific word 'biophilia' describe?",
    opts: ["The science of bacteria", "Humans' inborn bond with living things", "The study of biology", "A fear of nature"],
    ans: 1,
    why: "<strong>Humans' inborn bond with living things</strong> — coined by biologist E.O. Wilson in 1984. It explains why contact with nature restores tired attention and calms the mind."
  },
];

// ─────────────────────────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────────────────────────
let idx = 0, score = 0, maxStreak = 0, streak = 0;
const missed = [];
let shuffled = [];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ─────────────────────────────────────────────────────────────────
//  Render question
// ─────────────────────────────────────────────────────────────────
function render() {
  const q = shuffled[idx];
  document.getElementById('q-counter').textContent = `Question ${idx+1} of ${shuffled.length}`;
  document.getElementById('score-counter').textContent = `Score: ${score}`;
  document.getElementById('progress-bar-fill').style.width = `${(idx/shuffled.length)*100}%`;
  document.getElementById('topic-badge').textContent = q.topic;
  document.getElementById('topic-emoji').textContent = q.emoji;
  document.getElementById('topic-emoji').className = 'topic-emoji';
  document.getElementById('question-text').textContent = q.q;

  const fb = document.getElementById('feedback');
  fb.className = '';
  fb.style.display = 'none';
  fb.innerHTML = '';
  document.getElementById('next-btn').className = '';

  const wrap = document.getElementById('answers');
  wrap.innerHTML = '';

  // shuffle options while tracking the correct one
  const indices = shuffle([0,1,2,3]);
  const correctIdx = indices.indexOf(q.ans);

  indices.forEach((optIdx, btnPos) => {
    const btn = document.createElement('button');
    btn.className = 'ans-btn';
    btn.textContent = q.opts[optIdx];
    btn.dataset.pos = btnPos;
    btn.dataset.isCorrect = (btnPos === correctIdx) ? '1' : '0';
    btn.addEventListener('click', () => choose(btn, correctIdx, q));
    wrap.appendChild(btn);
  });
}

// ─────────────────────────────────────────────────────────────────
//  Handle answer choice
// ─────────────────────────────────────────────────────────────────
function choose(btn, correctIdx, q) {
  const allBtns = document.querySelectorAll('.ans-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = btn.dataset.isCorrect === '1';
  const fb = document.getElementById('feedback');
  const card = document.getElementById('card');
  const emoji = document.getElementById('topic-emoji');

  // mark buttons
  allBtns.forEach((b, i) => {
    if (b.dataset.isCorrect === '1') b.classList.add('correct');
    else if (b === btn && !isCorrect) b.classList.add('wrong');
  });

  if (isCorrect) {
    score++;
    streak++;
    maxStreak = Math.max(maxStreak, streak);
    fb.className = 'correct-fb show';
    fb.style.display = 'block';
    fb.innerHTML = `✅ <strong>Correct!</strong> ${q.why}`;
    emoji.classList.add('pop');
    setTimeout(() => emoji.classList.remove('pop'), 400);
    spawnConfetti();
  } else {
    streak = 0;
    missed.push(q.topic);
    fb.className = 'wrong-fb show';
    fb.style.display = 'block';
    fb.innerHTML = `❌ <strong>Not quite.</strong> ${q.why}`;
    card.classList.add('shake');
    setTimeout(() => card.classList.remove('shake'), 420);
  }

  document.getElementById('score-counter').textContent = `Score: ${score}`;
  document.getElementById('next-btn').className = 'show';
}

// ─────────────────────────────────────────────────────────────────
//  Confetti
// ─────────────────────────────────────────────────────────────────
function spawnConfetti() {
  const colors = ['#2f7d4f','#e8a93a','#2a6f9e','#fbe7c6','#5a3d1e'];
  const card = document.getElementById('card');
  const rect = card.getBoundingClientRect();
  for (let i = 0; i < 12; i++) {
    const d = document.createElement('div');
    d.className = 'confetti-dot';
    d.style.left = `${rect.left + Math.random()*rect.width}px`;
    d.style.top  = `${rect.top  + Math.random()*(rect.height*0.4)}px`;
    d.style.background = colors[Math.floor(Math.random()*colors.length)];
    d.style.animationDelay = `${Math.random()*0.3}s`;
    document.body.appendChild(d);
    setTimeout(() => d.remove(), 1100);
  }
}

// ─────────────────────────────────────────────────────────────────
//  Next
// ─────────────────────────────────────────────────────────────────
document.getElementById('next-btn').addEventListener('click', () => {
  idx++;
  if (idx < shuffled.length) {
    render();
  } else {
    showScore();
  }
});

// ─────────────────────────────────────────────────────────────────
//  Score screen
// ─────────────────────────────────────────────────────────────────
function showScore() {
  document.getElementById('quiz-wrap').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';
  const ss = document.getElementById('score-screen');
  ss.classList.add('show');

  const pct = Math.round((score/32)*100);
  let mega, stars, msg;

  if (score === 32) {
    mega = '🏆'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Perfect score! You mastered every single fact from the mission cards. You could teach this class!';
  } else if (score >= 28) {
    mega = '🌟'; stars = '⭐⭐⭐⭐⭐';
    msg = 'Outstanding! You absorbed almost everything from the cards. Your brain clearly loves a good walk in the sun.';
  } else if (score >= 22) {
    mega = '😎'; stars = '⭐⭐⭐⭐';
    msg = 'Great result! You really paid attention during the mission. Review the cards you missed and you\'ll nail it next time.';
  } else if (score >= 16) {
    mega = '💪'; stars = '⭐⭐⭐';
    msg = 'Good effort! You got the key ideas. Go back and read the cards you missed — the facts are fascinating once they sink in.';
  } else if (score >= 8) {
    mega = '🌱'; stars = '⭐⭐';
    msg = 'A solid start! The mission was about talking to your classmates — find someone who got a card you struggled with and ask them to explain it again.';
  } else {
    mega = '🤸'; stars = '⭐';
    msg = 'Time to go back to the cards! Every fact on this quiz was on a card you held today. Ask your classmates — that\'s what the mission was for!';
  }

  document.getElementById('score-mega').textContent = mega;
  document.getElementById('score-stars').textContent = stars;
  document.getElementById('score-num').textContent = `${score} / 32`;
  document.getElementById('score-msg').textContent = msg;
  document.getElementById('pct-pill').textContent = `${pct}% correct`;
  document.getElementById('streak-pill').textContent = maxStreak > 1 ? `Best streak: ${maxStreak} in a row 🔥` : 'Keep practising!';

  if (missed.length > 0) {
    const mw = document.getElementById('missed-wrap');
    mw.style.display = 'block';
    const ml = document.getElementById('missed-list');
    // deduplicate
    const unique = [...new Set(missed)];
    ml.innerHTML = unique.map(t => `<div class="missed-item">📌 <em>${t}</em> — find the card with this topic and re-read it!</div>`).join('');
  }
}

// ─────────────────────────────────────────────────────────────────
//  Restart
// ─────────────────────────────────────────────────────────────────
document.getElementById('restart-btn').addEventListener('click', () => {
  idx = 0; score = 0; maxStreak = 0; streak = 0; missed.length = 0;
  shuffled = shuffle(QS);
  document.getElementById('score-screen').classList.remove('show');
  document.getElementById('quiz-wrap').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  render();
});

// ─────────────────────────────────────────────────────────────────
//  Boot
// ─────────────────────────────────────────────────────────────────
shuffled = shuffle(QS);
render();
</script>
</body>
</html>
